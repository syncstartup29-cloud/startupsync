<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Inbox - Startup Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/></noscript>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:#F7F7F8; }
    :root { --bg:#F7F7F8; --border:#E4E4E7; --accent:#111118; --radius:12px; --font-h:'Sora',sans-serif; --font-b:'Inter',sans-serif; --ease:cubic-bezier(0.4,0,0.2,1); --shadow-card:0 2px 4px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.06); }
    body { font-family:var(--font-b); min-height:100vh; color:#111118; overflow-x:hidden; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }

    .top-nav { position:sticky; top:0; z-index:1000; background:#fff; border-bottom:1px solid #E4E4E7; box-shadow:0 1px 0 rgba(0,0,0,0.06); }
    .top-nav-inner { display:flex; align-items:center; height:60px; padding:0 20px; gap:4px; overflow:visible; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .top-nav-inner::-webkit-scrollbar { display:none; }

    .nav-brand { display:flex; flex-direction:row; align-items:center; gap:8px; padding-right:14px; border-right:1px solid #E4E4E7; flex-shrink:0; margin-right:8px; }
    .nav-brand-name-wrap { display:flex; align-items:flex-start; gap:2px; }
    .nav-brand-name { font-family:'Sora',sans-serif; font-size:0.82rem; font-weight:700; color:#111118; letter-spacing:0.02em; line-height:1.1; white-space:nowrap; }
    .nav-logo-circle { width:13px; height:13px; border-radius:50%; background:transparent; color:#111118; border:1.2px solid #111118; font-family:'Sora',sans-serif; font-size:0.4rem; font-weight:700; display:inline-flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0; }
    .nav-brand-text { display:flex; flex-direction:column; gap:1px; }
    .nav-brand-sub { font-size:0.44rem; color:#9CA3AF; font-weight:500; white-space:nowrap; }
    .nav-brand h1,.nav-brand p { display:none !important; }

    .nav-avatar { width:28px; height:28px; border-radius:50%; background:#111118; color:#fff; font-family:'Sora',sans-serif; font-size:0.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid #E4E4E7; cursor:pointer; flex-shrink:0; transition:border-color 0.15s,transform 0.15s,opacity 0.15s; overflow:hidden; margin-left:8px; margin-right:8px; opacity:0; background-size:cover; background-position:center; }
    .nav-avatar:hover { border-color:#111118; transform:scale(1.05); }
    .nav-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; display:block; }

    .nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 10px; border:none; background:transparent; color:#374151; font-family:'Inter',sans-serif; font-size:0.5rem; font-weight:500; cursor:pointer; border-radius:8px; flex:1; flex-shrink:0; transition:color 0.15s,background 0.15s; position:relative; -webkit-tap-highlight-color:transparent; white-space:nowrap; min-width:0; }
    .nav-btn svg { width:16px; height:16px; }
    .nav-btn:hover { color:#111118; background:#F4F4F5; }
    .nav-btn.active { color:#111118; background:#F4F4F5; }
    .nav-btn.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:2px; border-radius:2px; background:#111118; }
    .nav-badge { position:absolute; top:1px; right:2px; min-width:14px; height:14px; border-radius:999px; background:#111118; color:#fff; font-size:7px; font-weight:700; padding:0 3px; border:1.5px solid #fff; display:none; align-items:center; justify-content:center; }

    .modalOverlay { position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; padding:1rem; backdrop-filter:blur(4px); }
    .modalBox { background:#fff; border:1.5px solid #E4E4E7; border-radius:var(--radius); padding:2rem 1.75rem; width:min(420px,92vw); box-shadow:0 24px 64px rgba(0,0,0,0.15); }
    .modalBox h3 { font-family:'Sora',sans-serif; font-size:1rem; font-weight:700; color:#111118; margin-bottom:0.5rem; }
    .modalBox p { font-size:0.88rem; color:#374151; margin-bottom:1.25rem; line-height:1.7; }
    .modalInput { width:100%; background:#F4F4F5; border:1.5px solid #E4E4E7; border-radius:8px; padding:0.75rem 1rem; font-family:'Inter',sans-serif; font-size:0.88rem; color:#111118; outline:none; transition:border-color 0.2s; margin-bottom:1.25rem; }
    .modalInput:focus { border-color:#111118; }
    .modalBtns { display:flex; gap:0.75rem; }
    .modalCancel { flex:1; padding:0.75rem; border-radius:8px; border:1.5px solid #E4E4E7; background:#F4F4F5; color:#111118; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .modalConfirm { flex:1; padding:0.75rem; border-radius:8px; border:none; background:#EF4444; color:#fff; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .modalConfirm:disabled { opacity:0.4; cursor:not-allowed; }

    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#E4E4E7; border-radius:10px; }

    .page-wrapper { display:flex; flex:1; min-height:0; }
    .page-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; }
    .main-content { max-width:860px; margin:0 auto; width:100%; padding:1.5rem 1.25rem 2rem; flex:1; }
    .page-header { margin-bottom:1.25rem; }
    .page-header h2 { font-family:'Sora',sans-serif; font-size:1.25rem; font-weight:700; color:#111118; letter-spacing:0.03em; }
    .page-header p { font-size:0.92rem; color:#374151; margin-top:4px; }
    .section-label { font-family:'Sora',sans-serif; font-size:0.72rem; font-weight:700; color:#374151; letter-spacing:0.12em; text-transform:uppercase; margin:20px 0 4px; }
    .section-note { font-size:0.78rem; color:#4B5563; margin-bottom:8px; }
    .inbox-list { display:flex; flex-direction:column; gap:10px; }
    .inbox-card { background:#fff; border:1.5px solid #111118; border-radius:14px; overflow:hidden; transition:transform 0.18s ease; margin-bottom:0.65rem; }
    .inbox-card:hover { transform:translateY(-2px); }
    .card-main { padding:12px 14px; display:flex; gap:10px; align-items:center; }
    .profile-photo { width:42px; height:42px; min-width:42px; min-height:42px; max-width:42px; max-height:42px; border-radius:50%; flex-shrink:0; background:#F4F4F5; border:2px solid #E4E4E7; overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:700; font-size:0.88rem; color:#111118; }
    .profile-photo img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; border-radius:50%; max-width:42px; max-height:42px; }
    .card-center { flex:1; min-width:0; }
    .user-name { font-family:'Sora',sans-serif; font-size:0.9rem; font-weight:700; color:#111118; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .role-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .role-badge { font-family:'Inter',sans-serif; font-size:0.68rem; font-weight:600; padding:3px 8px; border-radius:999px; }
    .role-badge.founder { background:#EFF6FF; color:#1D4ED8; border:1px solid #BFDBFE; }
    .role-badge.investor { background:#F5F3FF; color:#6D28D9; border:1px solid #DDD6FE; }
    .card-subtitle { font-size:0.76rem; color:#374151; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .status-badge { font-family:'Inter',sans-serif; font-size:0.68rem; font-weight:600; padding:4px 10px; border-radius:999px; white-space:nowrap; flex-shrink:0; }
    .status-badge.pending { background:#F4F4F5; color:#374151; border:1px solid #E4E4E7; }
    .status-badge.accepted { background:#F0FDF4; color:#15803D; border:1px solid #BBF7D0; }
    .status-badge.declined { background:#FEF2F2; color:#B91C1C; border:1px solid #FECACA; }
    .status-badge.connected { background:#F0FDF4; color:#15803D; border:1px solid #BBF7D0; }
    .card-expanded { border-top:1px solid #F0F0F0; background:#FAFAFA; padding:14px 16px; }
    .msg-box { padding:10px 13px; border-radius:8px; font-size:0.82rem; line-height:1.6; margin-bottom:10px; }
    .msg-box.success { background:#F0FDF4; border:1px solid #BBF7D0; color:#15803D; }
    .msg-box.danger { background:#FEF2F2; border:1px solid #FECACA; color:#B91C1C; }
    .msg-box.waiting { background:#F4F4F5; border:1px solid #E4E4E7; color:#374151; }
    .action-buttons { display:flex; gap:8px; margin-bottom:10px; }
    .btn { flex:1; padding:9px 12px; border-radius:8px; border:none; font-family:'Sora',sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; transition:all 0.2s var(--ease); }
    .btn-accept { background:#111118; color:#fff; }
    .btn-accept:hover { background:#2d2d35; transform:translateY(-1px); }
    .btn-decline { background:#fff; color:#111118; border:1.5px solid #E4E4E7; }
    .btn-decline:hover { background:#F4F4F5; border-color:#111118; }
    .consent-note { font-size:0.72rem; color:#4B5563; margin-top:6px; }
    .contact-box { background:#fff; border:1px solid #E4E4E7; border-radius:8px; padding:14px; margin-top:10px; }
    .contact-title { font-family:'Sora',sans-serif; font-size:0.65rem; font-weight:700; color:#4B5563; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; }
    .contact-item { display:flex; align-items:flex-start; gap:8px; color:#111118; font-size:0.82rem; margin-bottom:6px; line-height:1.5; word-break:break-all; }
    .contact-item:last-child { margin-bottom:0; }
    .contact-item span { font-weight:600; min-width:60px; font-size:0.76rem; flex-shrink:0; color:#374151; }
    .empty-state { background:#fff; border:1.5px solid #E4E4E7; border-radius:var(--radius); padding:2rem 1.25rem; text-align:center; box-shadow:var(--shadow-card); }
    .empty-state h3 { font-family:'Sora',sans-serif; font-size:1.05rem; font-weight:700; color:#111118; margin-bottom:8px; }
    .empty-state p { font-size:0.88rem; color:#374151; }
    .empty-mini { background:#F4F4F5; border:1px solid #E4E4E7; border-radius:8px; padding:14px; font-size:0.82rem; color:#4B5563; text-align:center; }
    .skeleton { background:linear-gradient(90deg,#F4F4F5 25%,#E4E4E7 50%,#F4F4F5 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media(min-width:769px){ .top-nav-inner { overflow:visible; } .mob-brand-wrap,.mob-left-rail { display:none !important; } }

    @media(max-width:768px){
      .nav-btn { display:none !important; }
      .nav-brand { display:none !important; }
      .top-nav-inner { padding:0 10px; height:56px; justify-content:space-between; overflow:visible; gap:0; }
      .mob-brand-wrap { display:flex !important; flex:1; flex-direction:column; align-items:center; justify-content:center; }
      .mob-brand-name-row { display:flex; align-items:flex-start; gap:2px; }
      .mob-brand-name { font-family:'Sora',sans-serif; font-size:1rem; font-weight:800; color:#111118; letter-spacing:0.06em; line-height:1.1; }
      .mob-tm-circle { display:inline-flex !important; width:12px; height:12px; border-radius:50%; background:transparent; color:#111118; border:1.2px solid #111118; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-size:0.38rem; font-weight:700; flex-shrink:0; line-height:1; }
      .mob-brand-sub { font-size:0.82rem; font-weight:700; color:#374151; text-align:center; }
      .nav-avatar { margin-left:4px; margin-right:0; flex-shrink:0; }
      .page-wrapper { flex-direction:row; }
      .mob-left-rail { display:flex !important; flex-direction:column; align-items:center; gap:0; background:#fff; border-right:1px solid var(--border); width:56px; flex-shrink:0; padding:8px 0; overflow-y:auto; justify-content:space-evenly; min-height:calc(100vh - 56px); }
      .mob-rail-btn { display:flex !important; flex-direction:column; align-items:center; gap:3px; padding:12px 6px; border:none; background:transparent; color:#374151; font-size:0.36rem; font-weight:600; cursor:pointer; border-radius:6px; transition:color 0.15s,background 0.15s; position:relative; -webkit-tap-highlight-color:transparent; width:100%; }
      .mob-rail-btn svg { width:16px; height:16px; }
      .mob-rail-btn:hover,.mob-rail-btn.active { color:#111118; background:#F4F4F5; }
      .mob-rail-btn.active::after { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:2px; height:22px; border-radius:0 2px 2px 0; background:#111118; }
    }
  
    /* ==SS-BW-START== */
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;}
    body{overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body,button,input,select,textarea{font-family:'Sora','Inter',sans-serif!important;}
    input,select,textarea{font-size:max(16px,1em)!important;}
    body{padding-bottom:env(safe-area-inset-bottom,0);padding-left:env(safe-area-inset-left,0);padding-right:env(safe-area-inset-right,0);}

    /* Page Loader - shows on initial load only */
    #ss-loader{position:fixed;inset:0;z-index:2147483647;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .35s ease,visibility .35s ease;}
    #ss-loader.ss-gone{opacity:0;visibility:hidden;pointer-events:none;}
    #ss-loader .sll{width:52px;height:52px;border-radius:50%;background:#111118;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:ssLG 2s ease-in-out infinite;}
    #ss-loader .sll span{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.04em;}
    #ss-loader .sld{display:flex;gap:6px;}
    #ss-loader .sld span{width:6px;height:6px;border-radius:50%;background:#111118;animation:ssLD 1.4s ease-in-out infinite;}
    #ss-loader .sld span:nth-child(2){animation-delay:.2s;}
    #ss-loader .sld span:nth-child(3){animation-delay:.4s;}
    @keyframes ssLG{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,.1),0 2px 12px rgba(0,0,0,.2);}50%{box-shadow:0 0 0 6px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.32);}}
    @keyframes ssLD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Nav - TM transparent, logo glow */
    .nav-logo-circle{background:transparent!important;border:1.2px solid #111118!important;}
    .mob-tm-circle{background:transparent!important;border:1.2px solid #111118!important;}
    .top-nav{padding-top:env(safe-area-inset-top,0);}

    /* Black glow on ALL primary buttons */
    .btn-interested,.btn-accept,.btn-chat,.btn-go-connections,.btn-discover,.btn-unskip,
    .btn-connect,.submit-btn,.btn-interested,.send-otp-btn,
    button[type=submit]{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    @keyframes ssBtnG{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.22);}50%{box-shadow:0 5px 24px rgba(0,0,0,.45),0 0 0 3px rgba(0,0,0,.07);}}

    /* Index/login page - keep existing blue accent but add glow */
    #submitBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    #confirmOtpBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}

    /* B&W on index/reset - card top accent white */
    .container::before,.card::before{background:linear-gradient(90deg,#555 0%,#111 50%,#555 100%)!important;background-size:200% 100%!important;}

    /* Discover cards */
    .profile-grid .profile-card{border:1.5px solid #111118!important;box-shadow:3px 3px 0 #111118,0 4px 12px rgba(0,0,0,.07)!important;transition:transform .18s ease,box-shadow .18s ease!important;}
    .profile-grid .profile-card:hover{transform:translateY(-3px)!important;box-shadow:5px 5px 0 #111118,0 8px 24px rgba(0,0,0,.12)!important;}
    @keyframes ssCardIn{from{opacity:0;transform:translateY(18px) rotate(-1deg) scale(.97);}to{opacity:1;transform:translateY(0) rotate(0) scale(1);}}
    .profile-grid .profile-card{animation:ssCardIn .4s cubic-bezier(.34,1.3,.64,1) both;}

    /* Connected cards */
    .connection-card{border:1px solid #e0e0e0!important;box-shadow:0 2px 12px rgba(0,0,0,.06)!important;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s!important;}
    .connection-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#111118;border-radius:12px 12px 0 0;}
    .connection-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 22px rgba(0,0,0,.11)!important;}

    /* Skipped cards */
    .profiles-list .profile-card{border:1px solid #e4e4e7!important;box-shadow:0 1px 6px rgba(0,0,0,.05)!important;opacity:.8;position:relative;overflow:hidden;transition:opacity .2s,transform .2s!important;}
    .profiles-list .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#d1d1d1;border-radius:12px 12px 0 0;}
    .profiles-list .profile-card:hover{opacity:1;transform:translateY(-1px)!important;}

    /* Inbox cards */
    .inbox-card{border:1px solid #e8e8e8!important;box-shadow:0 2px 10px rgba(0,0,0,.06)!important;transition:transform .18s,box-shadow .18s!important;}
    .inbox-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 18px rgba(0,0,0,.1)!important;}

    /* Role badges */
    .role-badge.founder,.role-founder{background:#111118!important;color:#fff!important;border:1px solid #111118!important;}
    .role-badge.investor,.role-investor{background:#fff!important;color:#111118!important;border:1px solid #111118!important;}
    .connected-tag{background:#f0f0f0!important;border:1px solid #ddd!important;color:#111118!important;}
    .avatar{border:2px solid #111118!important;}
    .avatar-wrap{border:2px solid #111118!important;box-shadow:0 0 0 2px #fff,0 0 0 3.5px #111118!important;}

    /* Hide LinkedIn on cards */
    .linkedin-link{display:none!important;}

    /* Admin B&W */
    .admin-header{background:#111118!important;color:#fff!important;}
    .admin-table th{background:#111118!important;color:#fff!important;}

    /* Founder/Investor dashboard - B&W form cards */
    .card{box-shadow:0 4px 24px rgba(0,0,0,.08)!important;border:1px solid #e4e4e7!important;}
    .save-btn,.btn-save{animation:ssBtnG 2.8s ease-in-out infinite!important;background:#111118!important;color:#fff!important;}

    /* connections empty state */
    #emptyState{position:relative;overflow:hidden;}
    #emptyState canvas#ssEC{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    #emptyState .empty-inner{position:relative;z-index:1;}
    #emptyState.ss-go{opacity:0;transition:opacity .4s ease;pointer-events:none;}
    #emptyState.ss-gi{opacity:1;transition:opacity .4s ease;}
    .ss-pills{display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;margin:1.25rem auto 0;}
    .ss-pill{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:999px;border:1px solid #ebebeb;background:#fafafa;animation:ssPI 3s ease-in-out infinite;}
    .ss-pill:nth-child(2){animation-delay:.55s;}.ss-pill:nth-child(3){animation-delay:1.1s;}
    @keyframes ssPI{0%,100%{opacity:.45;}50%{opacity:1;}}
    .ss-pdot{width:7px;height:7px;border-radius:50%;background:#111118;flex-shrink:0;}
    .ss-pdot.g{background:#ccc;}
    .ss-pt{font-size:.72rem;font-weight:600;color:#333;flex:1;text-align:left;}
    .ss-ps{font-size:.6rem;font-weight:700;color:#bbb;}
    .ss-ps.live{color:#111118;}
    .ss-pr{display:flex;align-items:center;gap:14px;justify-content:center;margin:1rem 0;}
    .ss-pl-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,#ccc,transparent);}
    .ss-pd{display:flex;gap:5px;}
    .ss-pd span{width:5px;height:5px;border-radius:50%;background:#111118;animation:ssPD 1.5s ease-in-out infinite;}
    .ss-pd span:nth-child(2){animation-delay:.2s;}.ss-pd span:nth-child(3){animation-delay:.4s;}
    @keyframes ssPD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Welcome mobile */
    @media(max-width:768px){canvas#welcomeCanvas{display:none!important;}}

    /* Safari */
    @supports(-webkit-touch-callout:none){
      .top-nav{position:-webkit-sticky;position:sticky;}
      .mob-left-rail,.page-content,.ch-body,.users-list{-webkit-overflow-scrolling:touch;}
    }
    /* ==SS-BW-END== */

  
    /* ══ NEW TOP NAV ══ */
    .top-nav { position:sticky; top:0; z-index:1000; background:#fff; border-bottom:1.5px solid #111118; padding-top:env(safe-area-inset-top,0); }

  function safe(v){ return (v??'').toString(); }
  function statusLabel(s){ return s==="accepted"?"Accepted":s==="declined"?"Declined":"Pending"; }
  function getInitial(name){ return (safe(name)[0]||"U").toUpperCase(); }
  function avatarHTML(photo,name){ const p=safe(photo).trim(); if(p&&(p.startsWith("data:image/")||p.startsWith("http://")||p.startsWith("https://"))) return `<img src="${p}" alt="${safe(name)}" data-init="${getInitial(name)}" onerror="this.onerror=null;this.style.display='none';this.parentNode.textContent=this.dataset.init">`;return getInitial(name); }
  function renderExpandedReceived(req){ if(req.status==="pending") return `<div class="card-expanded"><div class="msg-box waiting">This person is interested in connecting with you.</div><div class="action-buttons"><button class="btn btn-accept" onclick="acceptRequest('${req._id}')">✓ Accept</button><button class="btn btn-decline" onclick="declineRequest('${req._id}')">✗ Decline</button></div><div class="consent-note">Accepting will share your contact details with them.</div></div>`; if(req.status==="accepted"){ const d=req.sharedData||{},fp=d.founderProfile||{},ip=d.investorProfile||{}; return `<div class="card-expanded"><div class="msg-box success">✅ Connection accepted.</div><div class="contact-box"><div class="contact-title">Shared Details</div>${safe(d.email)?`<div class="contact-item"><span>Email</span>${safe(d.email)}</div>`:""}${safe(d.phone)?`<div class="contact-item"><span>Phone</span>${safe(d.phone)}</div>`:""}${safe(fp.startupName)?`<div class="contact-item"><span>Startup</span>${safe(fp.startupName)}</div>`:""}${safe(fp.description)?`<div class="contact-item"><span>About</span>${safe(fp.description)}</div>`:""}${safe(ip.investorType)?`<div class="contact-item"><span>Type</span>${safe(ip.investorType)}</div>`:""}${safe(ip.investmentFocus)?`<div class="contact-item"><span>Focus</span>${safe(ip.investmentFocus)}</div>`:""}${safe(ip.financialCapacity)?`<div class="contact-item"><span>Financial Capacity</span>${safe(ip.financialCapacity)}</div>`:""}${safe(ip.bio)?`<div class="contact-item"><span>Bio</span>${safe(ip.bio)}</div>`:""}</div></div>`; } return `<div class="card-expanded"><div class="msg-box danger">You declined this request.</div></div>`; }
  function renderExpandedSent(req){ if(req.status==="accepted"){ const s=req.shared||req.sharedData||null; if(s){ let extra=""; if(s.role==="Founder"&&s.founderProfile) extra=`<div class="contact-item"><span>Startup</span>${safe(s.founderProfile.startupName)}</div><div class="contact-item"><span>About</span>${safe(s.founderProfile.description)}</div>`; if(s.role==="Investor"&&s.investorProfile) extra=`<div class="contact-item"><span>Type</span>${safe(s.investorProfile.investorType)}</div><div class="contact-item"><span>Focus</span>${safe(s.investorProfile.investmentFocus)}</div><div class="contact-item"><span>Financial Capacity</span>${safe(s.investorProfile.financialCapacity)}</div><div class="contact-item"><span>Bio</span>${safe(s.investorProfile.bio)}</div>`; return `<div class="card-expanded"><div class="msg-box success">✅ Request accepted.</div><div class="contact-box"><div class="contact-title">Shared Details</div>${safe(s.email)?`<div class="contact-item"><span>Email</span>${safe(s.email)}</div>`:""}${safe(s.phone)?`<div class="contact-item"><span>Phone</span>${safe(s.phone)}</div>`:""}${extra}</div></div>`; } return `<div class="card-expanded"><div class="msg-box success">✅ Your request was accepted.</div></div>`; } if(req.status==="declined") return `<div class="card-expanded"><div class="msg-box danger">They declined your request.</div></div>`; return ""; }
  function renderReceivedCard(req){ const from=req.fromUser||{},rc=safe(from.role).toLowerCase()==="founder"?"founder":"investor"; return `<div class="inbox-card"><div class="card-main"><div class="profile-photo">${avatarHTML(from.photo,from.fullName)}</div><div class="card-center"><div class="user-name">${safe(from.fullName)||"Unknown"}</div><div class="role-row"><span class="role-badge ${rc}">${safe(from.role)||"User"}</span></div></div><span class="status-badge ${safe(req.status)}">${statusLabel(req.status)}</span></div>${renderExpandedReceived(req)}</div>`; }
  function renderSentCard(req){ const to=req.toUser||{},rc=safe(to.role).toLowerCase()==="founder"?"founder":"investor"; return `<div class="inbox-card"><div class="card-main"><div class="profile-photo">${avatarHTML(to.photo,to.fullName)}</div><div class="card-center"><div class="user-name">${safe(to.fullName)||"Unknown"}</div><div class="role-row"><span class="role-badge ${rc}">${safe(to.role)||"User"}</span></div></div><span class="status-badge ${safe(req.status)}">${statusLabel(req.status)}</span></div>${renderExpandedSent(req)}</div>`; }
  function renderMergedCard(item){ const r=item.received,from=r.fromUser||{},rc=safe(from.role).toLowerCase()==="founder"?"founder":"investor"; const d=r.sharedData||{},fp=d.founderProfile||{},ip=d.investorProfile||{}; return `<div class="inbox-card"><div class="card-main"><div class="profile-photo">${avatarHTML(from.photo,from.fullName)}</div><div class="card-center"><div class="user-name">${safe(from.fullName)||"Unknown"}</div><div class="role-row"><span class="role-badge ${rc}">${safe(from.role)||"User"}</span></div></div><span class="status-badge connected">Connected</span></div><div class="card-expanded"><div class="msg-box success">🤝 Mutual interest — auto-connected!</div><div class="contact-box"><div class="contact-title">Shared Details</div>${safe(d.email)?`<div class="contact-item"><span>Email</span>${safe(d.email)}</div>`:""}${safe(d.phone)?`<div class="contact-item"><span>Phone</span>${safe(d.phone)}</div>`:""}${safe(fp.startupName)?`<div class="contact-item"><span>Startup</span>${safe(fp.startupName)}</div>`:""}${safe(ip.investmentFocus)?`<div class="contact-item"><span>Focus</span>${safe(ip.investmentFocus)}</div>`:""}${safe(ip.financialCapacity)?`<div class="contact-item"><span>Financial Capacity</span>${safe(ip.financialCapacity)}</div>`:""}</div></div></div>`; }
  async function loadInbox({silent=false}={}){ const container=document.getElementById("inbox-container"); try{ const _tok=localStorage.getItem("token")||sessionStorage.getItem("token")||""; const [ir,sr]=await Promise.all([fetch(`/inbox?userId=${encodeURIComponent(currentUser._id)}`,{cache:"no-store",headers:{"Authorization":`Bearer ${_tok}`}}),fetch(`/sent?userId=${encodeURIComponent(currentUser._id)}`,{cache:"no-store",headers:{"Authorization":`Bearer ${_tok}`}})]); const id=await ir.json(),sd=await sr.json(); const received=(id.success&&Array.isArray(id.requests))?id.requests:[]; const sent=(sd.success&&Array.isArray(sd.requests))?sd.requests:[]; const recvMap=new Map(),sentMap=new Map(); for(const r of received){ if(r.status==="accepted"&&r.fromUser?._id) recvMap.set(String(r.fromUser._id),r); } for(const s of sent){ if(s.status==="accepted"&&s.toUser?._id) sentMap.set(String(s.toUser._id),s); } const merged=[],mergedIds=new Set(); for(const [uid,r] of recvMap){ if(sentMap.has(uid)){merged.push({received:r});mergedIds.add(uid);} } const recvFinal=received.filter(r=>{ const uid=String(r.fromUser?._id||""); return r.status!=="accepted"||!mergedIds.has(uid); }); const sentFinal=sent.filter(s=>{ const uid=String(s.toUser?._id||""); return s.status!=="accepted"||!mergedIds.has(uid); }); if(!merged.length&&!recvFinal.length&&!sentFinal.length){ container.innerHTML=`<div class="empty-state"><h3>No requests yet</h3><p>When you send or receive interest, it will show here.</p></div>`; return; } container.innerHTML=`<div class="inbox-list">${merged.length?`<div class="section-label" style="margin-top:0;">🤝 Auto-Connected</div><div class="section-note">Mutual interest — connected automatically.</div>${merged.map(renderMergedCard).join("")}`:""}<div class="section-label" ${!merged.length?"style='margin-top:0;'":""}>📥 Received</div><div class="section-note">People who showed interest in you.</div>${recvFinal.length?recvFinal.map(renderReceivedCard).join(""):`<div class="empty-mini">No received requests yet</div>`}<div class="section-label">📤 Sent</div><div class="section-note">Requests you sent — track their status.</div>${sentFinal.length?sentFinal.map(renderSentCard).join(""):`<div class="empty-mini">No sent requests yet</div>`}</div>`; }catch(err){ if(!silent) container.innerHTML=`<div class="empty-state"><h3>Error loading inbox</h3><p>Please refresh and try again.</p></div>`; } }
  window.acceptRequest=async function(requestId){ try{ await fetch("/inbox/accept",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${localStorage.getItem("token")||sessionStorage.getItem("token")||""}`},body:JSON.stringify({userId:currentUser._id,requestId})}); }catch(e){} loadInbox(); };
  window.declineRequest=async function(requestId){ try{ await fetch("/inbox/decline",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${localStorage.getItem("token")||sessionStorage.getItem("token")||""}`},body:JSON.stringify({userId:currentUser._id,requestId})}); }catch(e){} loadInbox(); };
  loadInbox();
  setInterval(()=>loadInbox({silent:true}),30000);

  // Notification & chat badge polling
  // pollNotifications handled by custom-ui.js — removed to prevent duplicate toasts
  let totalUnread=0;
  // updateNotiBadge handled by custom-ui.js
  function updateChatBadge(){
    const txt=totalUnread>99?"99+":String(totalUnread);
    ["navChatBadge","mobNavChatBadge"].forEach(id=>{
      const b=document.getElementById(id); if(!b) return;
      if(totalUnread>0){b.textContent=txt;b.style.display="flex";}
      else{b.style.display="none";b.textContent="";}
    });
  }
  async function loadUnreadCounts(){
    try{
      const tok=localStorage.getItem("token")||sessionStorage.getItem("token")||"";
      const res=await fetch(`/chat/unread-counts?userId=${encodeURIComponent(currentUser._id)}`,{cache:"no-store",headers:{"Authorization":`Bearer ${tok}`}});
      const data=await res.json();
      if(data && data.success&&data.counts){ totalUnread=Object.values(data.counts).reduce((s,c)=>s+c,0); updateChatBadge(); }
    }catch(e){}
  }
  loadUnreadCounts();
  // Pause polling when tab is hidden
  var _unreadTimer = setInterval(loadUnreadCounts, 30000);
  document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
      clearInterval(_unreadTimer);
    } else {
      loadUnreadCounts();
      _unreadTimer = setInterval(loadUnreadCounts, 30000);
    }
  });

  // Real-time inbox updates via socket
  (function(){
    function bindInboxSocket(){
      var sock = window._ssSocket;
      if(!sock){
        // Fallback: wait for session-guard to set up the socket
        if(typeof window.io === "undefined") { setTimeout(bindInboxSocket, 300); return; }
        sock = window.io({auth:{userId:currentUser._id,token:localStorage.getItem("token")||sessionStorage.getItem("token")||""},transports:["websocket","polling"]});
        window._ssSocket = sock;
      }
      // Real-time: reload inbox on any connection event
      var realtimeEvents = ["notification:new","account:deleted"];
      realtimeEvents.forEach(function(ev){
        sock.on(ev, function(payload){
          // For notification:new, only reload on relevant types
          if(ev === "notification:new" && payload){
            var relevant = ["request_received","request_sent","auto_connected","connected","declined"];
            if(!relevant.includes(payload.type)) return;
          }
          if (!window._inboxLoading) { window._inboxLoading=true; loadInbox({silent:true}).finally(function(){window._inboxLoading=false;}); }
        });
      });
      // Also reload instantly on new chat messages (for unread badge accuracy)
      sock.on("chat:newMessage", function(){ loadUnreadCounts(); });
    }
    if(typeof window.io !== "undefined" || window._ssSocket){ bindInboxSocket(); }
    else {
      var _w = setInterval(function(){
        if(typeof window.io !== "undefined" || window._ssSocket){ clearInterval(_w); bindInboxSocket(); }
      }, 200);
      setTimeout(function(){ clearInterval(_w); }, 10000);
    }
  })();

// Loads avatar with photo/initials + click goes to profile editor
(function(){
  function initAvatar() {
    var el = document.getElementById('sbAvatar');
    if (!el) return;
    try {
      var cu = JSON.parse(localStorage.getItem("currentUser")||sessionStorage.getItem("currentUser")||"null");
      if (!cu) return;
      var name = (cu.fullName || "U").trim();
      var parts = name.split(/\s+/).filter(Boolean);
      var initials = parts.map(function(w){return w[0]||"";}).join("").substring(0,2).toUpperCase()||"U";
      var isFounder = (cu.role||"").toLowerCase()==="founder";
      var p = isFounder ? (cu.founderProfile||{}) : (cu.investorProfile||{});
      var photo = (p.photo||cu.photo||localStorage.getItem("profilePhoto")||sessionStorage.getItem("profilePhoto")||"").trim();

      function showInitials() {
        el.style.backgroundImage="";
        el.innerHTML="";
        el.textContent = initials;
        el.style.color = "#fff";
        el.style.opacity = "1";
      }
      function showPhoto(src) {
        var img = document.createElement("img");
        img.src = src; img.alt = name;
        img.onload = function() {
          el.innerHTML = "";
          el.appendChild(img);
          el.style.opacity = "1";
        };
        img.onerror = showInitials;
      }
      if (photo && (photo.startsWith("data:image/")||photo.startsWith("http")||photo.startsWith("/"))) {
        showPhoto(photo);
      } else {
        showInitials();
      }

      // Click navigates to the dashboard for current role
      el.style.cursor = "pointer";
      el.title = "Edit Profile";
      el.addEventListener("click", function() {
        var role = (cu.role||"").toLowerCase();
        window.location.href = role === "founder" ? "founder-dashboard.html" : "investor-dashboard.html";
      });

      // Fetch latest from server for up-to-date photo
      if (cu._id) {
        fetch("/get-user?userId=" + encodeURIComponent(cu._id), {
          cache: "no-store",
          headers: { "Authorization": "Bearer " + (localStorage.getItem("token")||sessionStorage.getItem("token")||"") }
        })
        .then(function(r){return r.json();})
        .then(function(d){
          if (!d || !d.success) return;
          if (d.photo && d.photo.trim()) showPhoto(d.photo.trim());
        }).catch(function(){});
      }
    } catch(e) {}
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initAvatar);
  } else {
    initAvatar();
  }
})();
</script>

  // 2. Avatar NO-FLASH — preload photo BEFORE showing initials
  function initAvatarNoFlash() {
    var el = document.getElementById('sbAvatar');
    if (!el) return;

      var cu = JSON.parse(localStorage.getItem("currentUser") || sessionStorage.getItem("currentUser") || "null");

      var name = (cu.fullName || "U").trim();

    });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", ensureBadges);
  else ensureBadges();

  // 4. LOGOUT CLEANUP — sets flag BEFORE clearing storage
  function cleanupOnLogout() {
    try {
      localStorage.setItem('_ss_loggingOut', '1');
      sessionStorage.setItem('_ss_loggingOut', '1');
      var keys = [];
      for (var i=0; i<localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && (k.indexOf("ss_activetab_")===0 || k.indexOf("ss_tab_")===0)) keys.push(k);
      }
      keys.forEach(function(k){ localStorage.removeItem(k); });
      setTimeout(function() {
        try { localStorage.removeItem('_ss_loggingOut'); } catch(e) {}
        try { sessionStorage.removeItem('_ss_loggingOut'); } catch(e) {}
      }, 5000);
    } catch(e) {}
  }
  document.addEventListener("click", function(ev) {
    var el = ev.target;
    while (el && el !== document.body) {
      var attr = el.getAttribute && el.getAttribute("onclick");
      if (attr && (attr.indexOf("/logout")!==-1 || attr.indexOf("Logout")!==-1)) { cleanupOnLogout(); break; }
      el = el.parentElement;
    }
  }, true);
})();

  // ── Inline toast (replaces native alert) ──
  function _ssAlert(msg){ 
    var t=document.createElement('div');
    t.textContent=msg;
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111118;color:#fff;padding:10px 20px;border-radius:10px;font-family:Sora,sans-serif;font-size:0.8rem;font-weight:600;z-index:2147483647;box-shadow:0 4px 20px rgba(0,0,0,0.25);max-width:90vw;text-align:center;';
    document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3000);
  }

  function _ssAlert(m){var t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111118;color:#fff;padding:10px 20px;border-radius:10px;font-family:Sora,sans-serif;font-size:.8rem;font-weight:600;z-index:2147483647;box-shadow:0 4px 20px rgba(0,0,0,.25);max-width:90vw;text-align:center;';document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3000);}
</script>
