<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Skipped - Startup Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/></noscript>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:#F7F7F8; }
    :root { --bg:#F7F7F8; --border:#E4E4E7; --text:#111118; --sub:#374151; --muted:#6B7280; --radius:12px; --font-h:'Sora',sans-serif; --font-b:'Inter',sans-serif; --ease:cubic-bezier(0.4,0,0.2,1); --shadow-card:0 2px 4px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.06); }
    body { font-family:var(--font-b); min-height:100vh; color:var(--text); overflow-x:hidden; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
    button,input,textarea,select { font-family:inherit; font-size:16px; }

    /* OLD NAV REMOVED */
    .top-nav-inner::-webkit-scrollbar { display:none; }

    .nav-brand { display:flex; flex-direction:row; align-items:center; gap:8px; padding-right:14px; border-right:1px solid #E4E4E7; flex-shrink:0; margin-right:8px; }
    .nav-brand-name-wrap { display:flex; align-items:flex-start; gap:2px; }
    .nav-brand-name { font-family:'Sora',sans-serif; font-size:0.82rem; font-weight:700; color:#111118; letter-spacing:0.02em; line-height:1.1; white-space:nowrap; }
    .nav-logo-circle { width:13px; height:13px; border-radius:50%; background:transparent; color:#111118; border:1.2px solid #111118; font-family:'Sora',sans-serif; font-size:0.4rem; font-weight:700; display:inline-flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0; }
    .nav-brand-text { display:flex; flex-direction:column; gap:1px; }
    .nav-brand-sub { font-size:0.44rem; color:#9CA3AF; font-weight:500; white-space:nowrap; }
    .nav-brand h1,.nav-brand p { display:none !important; }

    .nav-avatar { width:28px; height:28px; border-radius:50%; background:var(--text); color:#fff; font-family:var(--font-h); font-size:0.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid var(--border); cursor:pointer; flex-shrink:0; transition:border-color 0.15s,transform 0.15s,opacity 0.15s; overflow:hidden; margin-left:8px; margin-right:8px; opacity:0; background-size:cover; background-position:center; }
    .nav-avatar:hover { border-color:var(--text); transform:scale(1.05); }
    .nav-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; display:block; }

    .nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 10px; border:none; background:transparent; color:#374151; font-family:var(--font-b); font-size:0.5rem; font-weight:500; cursor:pointer; border-radius:8px; flex:1; flex-shrink:0; transition:color 0.15s,background 0.15s; position:relative; -webkit-tap-highlight-color:transparent; white-space:nowrap; min-width:0; }
    .nav-btn svg { width:16px; height:16px; }
    .nav-btn:hover { color:var(--text); background:#F4F4F5; }
    .nav-btn.active { color:var(--text); background:#F4F4F5; }
    .nav-btn.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:2px; border-radius:2px; background:var(--text); }

    .modalOverlay { position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; padding:1rem; backdrop-filter:blur(4px); }
    .modalBox { background:#fff; border:1.5px solid var(--border); border-radius:var(--radius); padding:2rem 1.75rem; width:min(420px,92vw); box-shadow:0 24px 64px rgba(0,0,0,0.15); }
    .modalBox h3 { font-family:var(--font-h); font-size:1rem; font-weight:700; color:var(--text); margin-bottom:0.5rem; }
    .modalBox p { font-size:0.88rem; color:var(--sub); margin-bottom:1.25rem; line-height:1.7; }
    .modalInput { width:100%; background:#F4F4F5; border:1.5px solid var(--border); border-radius:8px; padding:0.75rem 1rem; font-family:var(--font-b); font-size:0.88rem; color:var(--text); outline:none; transition:border-color 0.2s; margin-bottom:1.25rem; }
    .modalInput:focus { border-color:var(--text); }
    .modalBtns { display:flex; gap:0.75rem; }
    .modalCancel { flex:1; padding:0.75rem; border-radius:8px; border:1.5px solid var(--border); background:#F4F4F5; color:var(--text); font-family:var(--font-h); font-size:0.78rem; font-weight:600; cursor:pointer; }
    .modalConfirm { flex:1; padding:0.75rem; border-radius:8px; border:none; background:#EF4444; color:#fff; font-family:var(--font-h); font-size:0.78rem; font-weight:600; cursor:pointer; }
    .modalConfirm:disabled { opacity:0.4; cursor:not-allowed; }

    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

    .page-wrapper { display:flex; flex:1; min-height:0; }
    .page-content { flex:1; display:flex; flex-direction:column; overflow-y:auto; }
    .main-content { max-width:860px; margin:0 auto; width:100%; padding:1.5rem 1.25rem 2rem; flex:1; }
    .page-header { margin-bottom:1.25rem; }
    .page-header h2 { font-family:'Sora',sans-serif; font-size:1.4rem; font-weight:800; color:#111118; letter-spacing:-0.02em; }
    .page-header p { font-size:0.78rem; color:#374151; margin-top:3px; }

    .profiles-list { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media(min-width:640px)  { .profiles-list { grid-template-columns:repeat(2,1fr); gap:12px; } }
    @media(min-width:1024px) { .profiles-list { grid-template-columns:repeat(3,1fr); gap:14px; } }
    @media(min-width:1280px) { .profiles-list { grid-template-columns:repeat(4,1fr); gap:14px; } }
    .profile-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-card); transition:transform 0.2s var(--ease),box-shadow 0.2s var(--ease); }
    .profile-card:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,0.09); }
    .card-main { padding:12px 14px; display:flex; gap:12px; align-items:center; }
    .profile-photo { width:48px; height:48px; min-width:48px; min-height:48px; max-width:48px; max-height:48px; border-radius:50%; flex-shrink:0; background:#F4F4F5; border:1.5px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:var(--font-h); font-weight:700; font-size:1rem; color:var(--text); }
    .profile-photo img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; border-radius:50%; }
    .card-center { flex:1; min-width:0; }
    .user-name { font-family:var(--font-h); font-size:0.9rem; font-weight:700; color:var(--text); margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .role-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:3px; }
    .role-badge { font-family:var(--font-b); font-size:0.68rem; font-weight:600; padding:3px 8px; border-radius:999px; }
    .role-badge.founder { background:#111118 !important; color:#fff !important; border:1px solid #111118 !important; }
    .role-badge.investor { background:#fff !important; color:#111118 !important; border:1.5px solid #111118 !important; }
    .card-subtitle { font-size:0.76rem; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card-desc { font-size:0.74rem; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card-actions { padding:0 14px 12px; display:flex; gap:8px; }
    .btn-unskip { flex:1; padding:9px 12px; border-radius:8px; border:1.5px solid var(--border); background:#F4F4F5; color:var(--text); font-family:var(--font-h); font-size:0.7rem; font-weight:600; letter-spacing:0.04em; cursor:pointer; transition:all 0.2s var(--ease); }
    .btn-unskip:hover { background:var(--text); color:#fff; border-color:var(--text); transform:translateY(-1px); }
    .empty-state { display:none; background:#fff; border:1.5px solid var(--border); border-radius:var(--radius); padding:2.5rem 1.5rem; text-align:center; box-shadow:var(--shadow-card); }
    .empty-state.visible { display:block; }
    .empty-state h3 { font-family:var(--font-h); font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:8px; }
    .empty-state p { font-size:0.88rem; color:var(--sub); margin-bottom:1.25rem; line-height:1.6; }
    .btn-go-connections { display:inline-block; padding:10px 24px; border-radius:8px; border:none; background:var(--text); color:#fff; font-family:var(--font-h); font-size:0.72rem; font-weight:600; cursor:pointer; transition:all 0.2s var(--ease); }
    .btn-go-connections:hover { background:#2d2d35; transform:translateY(-1px); }
    .skeleton { background:linear-gradient(90deg,#F4F4F5 25%,#E4E4E7 50%,#F4F4F5 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media(min-width:769px){ .top-nav-inner { overflow:visible; } .mob-brand-wrap,.mob-left-rail { display:none !important; } }

    @media(max-width:768px){
      .nav-btn { display:none !important; }
      .nav-brand { display:none !important; }
      .top-nav-inner { padding:0 10px; height:56px; justify-content:space-between; overflow:visible; gap:0; }
      .mob-brand-wrap { display:flex !important; flex:1; flex-direction:column; align-items:center; justify-content:center; }
      .mob-brand-name-row { display:flex; align-items:flex-start; gap:2px; }
      .mob-brand-name { font-family:'Sora',sans-serif; font-size:1.2rem; font-weight:700; color:#111118; letter-spacing:0.02em; line-height:1.1; }
      .mob-tm-circle { display:inline-flex !important; width:12px; height:12px; border-radius:50%; background:transparent; color:#111118; border:1.2px solid #111118; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-size:0.38rem; font-weight:700; flex-shrink:0; line-height:1; }
      .mob-brand-sub { font-size:0.65rem; color:#9CA3AF; font-weight:500; text-align:center; }
      .nav-avatar { margin-left:4px; margin-right:0; flex-shrink:0; }
      .page-wrapper { flex-direction:row; }
      .mob-left-rail { display:flex !important; flex-direction:column; align-items:center; gap:0; background:#fff; border-right:1px solid var(--border); width:56px; flex-shrink:0; padding:8px 0; overflow-y:auto; justify-content:space-evenly; min-height:calc(100vh - 56px); }
      .mob-rail-btn { display:flex !important; flex-direction:column; align-items:center; gap:3px; padding:12px 6px; border:none; background:transparent; color:#374151; font-size:0.36rem; font-weight:600; cursor:pointer; border-radius:6px; transition:color 0.15s,background 0.15s; position:relative; -webkit-tap-highlight-color:transparent; width:100%; }
      .mob-rail-btn svg { width:16px; height:16px; }
      .mob-rail-btn:hover,.mob-rail-btn.active { color:#111118; background:#F4F4F5; }
      .mob-rail-btn.active::after { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:2px; height:22px; border-radius:0 2px 2px 0; background:#111118; }
    }
  
    /* ==SS-BW-START== */
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;}
    body{overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body,button,input,select,textarea{font-family:'Sora','Inter',sans-serif!important;}
    input,select,textarea{font-size:max(16px,1em)!important;}
    body{padding-bottom:env(safe-area-inset-bottom,0);padding-left:env(safe-area-inset-left,0);padding-right:env(safe-area-inset-right,0);}

    /* Page Loader - shows on initial load only */
    #ss-loader{position:fixed;inset:0;z-index:2147483647;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .35s ease,visibility .35s ease;}
    #ss-loader.ss-gone{opacity:0;visibility:hidden;pointer-events:none;}
    #ss-loader .sll{width:52px;height:52px;border-radius:50%;background:#111118;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:ssLG 2s ease-in-out infinite;}
    #ss-loader .sll span{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.04em;}
    #ss-loader .sld{display:flex;gap:6px;}
    #ss-loader .sld span{width:6px;height:6px;border-radius:50%;background:#111118;animation:ssLD 1.4s ease-in-out infinite;}
    #ss-loader .sld span:nth-child(2){animation-delay:.2s;}
    #ss-loader .sld span:nth-child(3){animation-delay:.4s;}
    @keyframes ssLG{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,.1),0 2px 12px rgba(0,0,0,.2);}50%{box-shadow:0 0 0 6px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.32);}}
    @keyframes ssLD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Nav - TM transparent, logo glow */
    .nav-logo-circle{background:transparent!important;border:1.2px solid #111118!important;}
    .mob-tm-circle{background:transparent!important;border:1.2px solid #111118!important;}
    .top-nav{padding-top:env(safe-area-inset-top,0);}

    /* Black glow on ALL primary buttons */
    .btn-interested,.btn-accept,.btn-chat,.btn-go-connections,.btn-discover,.btn-unskip,
    .btn-connect,.submit-btn,.btn-interested,.send-otp-btn,
    button[type=submit]{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    @keyframes ssBtnG{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.22);}50%{box-shadow:0 5px 24px rgba(0,0,0,.45),0 0 0 3px rgba(0,0,0,.07);}}

    /* Index/login page - keep existing blue accent but add glow */
    #submitBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    #confirmOtpBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}

    /* B&W on index/reset - card top accent white */
    .container::before,.card::before{background:linear-gradient(90deg,#555 0%,#111 50%,#555 100%)!important;background-size:200% 100%!important;}

    /* Discover cards */
    .profile-grid .profile-card{border:1.5px solid #111118!important;box-shadow:3px 3px 0 #111118,0 4px 12px rgba(0,0,0,.07)!important;transition:transform .18s ease,box-shadow .18s ease!important;}
    .profile-grid .profile-card:hover{transform:translateY(-3px)!important;box-shadow:5px 5px 0 #111118,0 8px 24px rgba(0,0,0,.12)!important;}
    @keyframes ssCardIn{from{opacity:0;transform:translateY(18px) rotate(-1deg) scale(.97);}to{opacity:1;transform:translateY(0) rotate(0) scale(1);}}
    .profile-grid .profile-card{animation:ssCardIn .4s cubic-bezier(.34,1.3,.64,1) both;}

    /* Connected cards */
    .connection-card{border:1px solid #e0e0e0!important;box-shadow:0 2px 12px rgba(0,0,0,.06)!important;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s!important;}
    .connection-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#111118;border-radius:12px 12px 0 0;}
    .connection-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 22px rgba(0,0,0,.11)!important;}

    /* Skipped cards */
    .profiles-list .profile-card{border:1.5px solid #111118!important;box-shadow:0 2px 0 #111118,0 4px 12px rgba(0,0,0,.08)!important;opacity:1;position:relative;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease!important;}
    .profiles-list .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#111118;border-radius:12px 12px 0 0;}
    .profiles-list .profile-card:hover{opacity:1;transform:translateY(-3px)!important;box-shadow:0 5px 0 #111118,0 8px 24px rgba(0,0,0,.12)!important;}

    /* Inbox cards */
    .inbox-card{border:1px solid #e8e8e8!important;box-shadow:0 2px 10px rgba(0,0,0,.06)!important;transition:transform .18s,box-shadow .18s!important;}
    .inbox-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 18px rgba(0,0,0,.1)!important;}

    /* Role badges */
    .role-badge.founder,.role-founder{background:#111118!important;color:#fff!important;border:1px solid #111118!important;}
    .role-badge.investor,.role-investor{background:#fff!important;color:#111118!important;border:1px solid #111118!important;}
    .connected-tag{background:#f0f0f0!important;border:1px solid #ddd!important;color:#111118!important;}
    .avatar{border:2px solid #111118!important;}
    .avatar-wrap{border:2px solid #111118!important;box-shadow:0 0 0 2px #fff,0 0 0 3.5px #111118!important;}

    /* Hide LinkedIn on cards */
    .linkedin-link{display:none!important;}

    /* Admin B&W */
    .admin-header{background:#111118!important;color:#fff!important;}
    .admin-table th{background:#111118!important;color:#fff!important;}

    /* Founder/Investor dashboard - B&W form cards */
    .card{box-shadow:0 4px 24px rgba(0,0,0,.08)!important;border:1px solid #e4e4e7!important;}
    .save-btn,.btn-save{animation:ssBtnG 2.8s ease-in-out infinite!important;background:#111118!important;color:#fff!important;}

    /* connections empty state */
    #emptyState{position:relative;overflow:hidden;}
    #emptyState canvas#ssEC{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    #emptyState .empty-inner{position:relative;z-index:1;}
    #emptyState.ss-go{opacity:0;transition:opacity .4s ease;pointer-events:none;}
    #emptyState.ss-gi{opacity:1;transition:opacity .4s ease;}
    .ss-pills{display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;margin:1.25rem auto 0;}
    .ss-pill{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:999px;border:1px solid #ebebeb;background:#fafafa;animation:ssPI 3s ease-in-out infinite;}
    .ss-pill:nth-child(2){animation-delay:.55s;}.ss-pill:nth-child(3){animation-delay:1.1s;}
    @keyframes ssPI{0%,100%{opacity:.45;}50%{opacity:1;}}
    .ss-pdot{width:7px;height:7px;border-radius:50%;background:#111118;flex-shrink:0;}
    .ss-pdot.g{background:#ccc;}
    .ss-pt{font-size:.72rem;font-weight:600;color:#333;flex:1;text-align:left;}
    .ss-ps{font-size:.6rem;font-weight:700;color:#bbb;}
    .ss-ps.live{color:#111118;}
    .ss-pr{display:flex;align-items:center;gap:14px;justify-content:center;margin:1rem 0;}
    .ss-pl-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,#ccc,transparent);}
    .ss-pd{display:flex;gap:5px;}
    .ss-pd span{width:5px;height:5px;border-radius:50%;background:#111118;animation:ssPD 1.5s ease-in-out infinite;}
    .ss-pd span:nth-child(2){animation-delay:.2s;}.ss-pd span:nth-child(3){animation-delay:.4s;}
    @keyframes ssPD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Welcome mobile */
    @media(max-width:768px){canvas#welcomeCanvas{display:none!important;}}

    /* Safari */
    @supports(-webkit-touch-callout:none){
      .top-nav{position:-webkit-sticky;position:sticky;}
      .mob-left-rail,.page-content,.ch-body,.users-list{-webkit-overflow-scrolling:touch;}
    }
    /* ==SS-BW-END== */

  
    /* ══ UNIFIED NAV + mobile-proof ══ */
    nav.top-nav {
      position:sticky !important; top:0 !important; z-index:1000 !important;
      background:#fff !important; border-bottom:1.5px solid #111118 !important;
      padding-top:env(safe-area-inset-top,0) !important;
      width:100% !important;
    }
    nav.top-nav .top-nav-inner {
      display:grid !important;
      grid-template-columns:auto 1fr auto !important;
      align-items:center !important;
      gap:.6rem !important;
      padding:0 .9rem !important;
      height: 62px !important;
      width:100% !important;
      max-width:100% !important;
      margin:0 !important;
      overflow:visible !important;
      box-sizing:border-box !important;
    }
    nav.top-nav .nav-left { justify-self:start !important; min-width:0 !important; }
    nav.top-nav .nav-center { justify-self:center !important; min-width:0 !important; overflow:hidden !important; text-align:center !important; }
    nav.top-nav .nav-right { justify-self:end !important; flex-shrink:0 !important; }
    nav.top-nav .nav-brand-name { font-family:'Sora',sans-serif !important; font-size:clamp(.68rem, 2.6vw, 1rem) !important; font-weight:800 !important; color:#111118 !important; letter-spacing:.05em !important; white-space:nowrap !important; }
    nav.top-nav .nav-tm { font-family:'Sora',sans-serif !important; font-size:.5em !important; font-weight:700 !important; color:#111118 !important; vertical-align:baseline !important; position:relative !important; top:-.55em !important; margin-left:-1px !important; line-height:1 !important; }
    nav.top-nav .nav-tagline { font-family:'Sora',sans-serif !important; font-size:0.9rem !important; font-weight:800 !important; color:#111118 !important; letter-spacing:-.01em !important; white-space:nowrap !important; overflow:hidden !important; text-overflow:ellipsis !important; display:block !important; }
    nav.top-nav .nav-avatar {
      width:clamp(28px, 8vw, 36px) !important; height:clamp(28px, 8vw, 36px) !important;
      min-width:28px !important; border-radius:50% !important;
      background:#111118 !important; color:#fff !important;
      font-family:'Sora',sans-serif !important; font-size:.7rem !important; font-weight:800 !important;
      display:flex !important; align-items:center !important; justify-content:center !important;
      cursor:pointer !important; border:2px solid #111118 !important;

<script>
(function(){
  try{
    var cu=JSON.parse(localStorage.getItem("currentUser")||sessionStorage.getItem("currentUser")||"null");
    if(!cu||!cu._id) return;
    var isFounder=(cu.role||"").toLowerCase()==="founder";
    var p=isFounder?(cu.founderProfile||{}):(cu.investorProfile||{});
    var photo=(p.photo||cu.photo||localStorage.getItem("profilePhoto")||sessionStorage.getItem("profilePhoto")||"").trim();
    if(!photo||!(photo.startsWith("data:image/")||photo.startsWith("http")||photo.startsWith("/"))) return;
    // Inject CSS that hides initials text until img loads — zero flash
    var style=document.createElement("style");
    style.id="_ssAvatarPreload";
    style.textContent='#sbAvatar{color:transparent!important;background:#111118!important;}';
    document.head.appendChild(style);
    // Preload image NOW in <head> before body renders
    var img=new Image();
    img.onload=function(){
      var el=document.getElementById("sbAvatar");
      if(!el) return;
      el.innerHTML="";
      var i=document.createElement("img");
      i.src=photo;
      i.style.cssText="width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center;display:block;";
      el.appendChild(i);
      // Remove the hiding style
      var s=document.getElementById("_ssAvatarPreload");
      if(s) s.parentNode.removeChild(s);
    };
    img.src=photo;
  }catch(e){}
})();
</script>

<script>
  function getCurrentUser(){ try{ return JSON.parse(localStorage.getItem("currentUser")); }catch{ return null; } }
  const currentUser=getCurrentUser();
  if(!currentUser || !currentUser._id) window.location.href="index.html";

  (function(){ const el=document.getElementById("sbAvatar"); if(!el) return; const name=currentUser?.fullName||"U"; const initials=name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase(); const profile=currentUser?.founderProfile||currentUser?.investorProfile||{}; const photo=(profile.photo||"").trim(); if(photo&&(photo.startsWith("data:image/")||photo.startsWith("http://")||photo.startsWith("https://"))){ el.innerHTML=`<img src="${photo}" alt="${name}" onerror="this.onerror=null;this.parentNode.textContent='${initials}'">`; }else{ el.textContent=initials; } })();

  function goEditProfile(){ const u=getCurrentUser(); if(!u || !u.role) return; window.location.href=u.role==="Founder"?"founder-dashboard.html":"investor-dashboard.html"; }
  function openDeleteModal(){ document.getElementById("deleteConfirmInput").value=""; document.getElementById("modalConfirmBtn").disabled=true; document.getElementById("deleteModal").style.display="flex"; setTimeout(()=>document.getElementById("deleteConfirmInput").focus(),100); }

  document.getElementById("sbAvatar")?.addEventListener("click",goEditProfile);
  document.getElementById("nav-discover")?.addEventListener("click",()=>window.location.href="connections.html");
  document.getElementById("nav-inbox")?.addEventListener("click",()=>window.location.href="inbox.html");
  document.getElementById("nav-notifications")?.addEventListener("click",()=>window.location.href="notifications.html");
  document.getElementById("nav-chat")?.addEventListener("click",()=>window.location.href="chat.html");
  document.getElementById("nav-connected")?.addEventListener("click",()=>window.location.href="connected.html");
  document.getElementById("nav-delete")?.addEventListener("click",openDeleteModal);
  document.getElementById("nav-help")?.addEventListener("click",()=>window.location.href="help.html");
  document.getElementById("nav-logout")?.addEventListener("click",()=>{ localStorage.removeItem("currentUser"); localStorage.removeItem("token"); sessionStorage.removeItem("currentUser"); sessionStorage.removeItem("token"); window.location.href="index.html"; });
  document.getElementById("goConnectionsBtn")?.addEventListener("click",()=>window.location.href="connections.html");
  document.getElementById("modalCancelBtn")?.addEventListener("click",()=>{ document.getElementById("deleteModal").style.display="none"; });
  document.getElementById("deleteModal")?.addEventListener("click",e=>{ if(e.target===document.getElementById("deleteModal")) document.getElementById("deleteModal").style.display="none"; });
  document.getElementById("deleteConfirmInput")?.addEventListener("input",()=>{ document.getElementById("modalConfirmBtn").disabled=document.getElementById("deleteConfirmInput").value.trim()!=="delete your account"; });
  document.getElementById("modalConfirmBtn")?.addEventListener("click",async()=>{ document.getElementById("modalConfirmBtn").disabled=true; document.getElementById("modalConfirmBtn").textContent="Deleting..."; try{ const resp=await fetch("/account/delete",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${localStorage.getItem("token")||sessionStorage.getItem("token")||""}`},body:JSON.stringify({userId:currentUser._id})}).then(r=>r.json())
      .catch(function(err){ console.error("[skipped.html] fetch error:", err); }); if(resp && resp.success){ localStorage.clear(); sessionStorage.clear(); window.location.replace("index.html"); }else{ _ssAlert("❌ "+(resp && resp.message||"Try again.")); document.getElementById("modalConfirmBtn").disabled=false; document.getElementById("modalConfirmBtn").textContent="Delete Forever"; } }catch(e){ _ssAlert("❌ Server error."); document.getElementById("modalConfirmBtn").disabled=false; document.getElementById("modalConfirmBtn").textContent="Delete Forever"; } });

  function safe(v){ return (v??'').toString(); }
  function getInitial(name){ return (safe(name)[0]||"U").toUpperCase(); }

  function cardHTML(u){
    const profile=(u.role==="Founder")?(u.founderProfile||{}):(u.investorProfile||{});
    const subtitle=profile.startupName||profile.investmentFocus||"";
    const desc=profile.description||profile.bio||"";
    const photo=(profile.photo||"").trim();
    const rc=(u.role||"").toLowerCase()==="founder"?"founder":"investor";
    const avHTML=photo?`<img src="${safe(photo)}" alt="${safe(u.fullName)}" data-init="${getInitial(u.fullName)}" onerror="this.onerror=null;this.style.display='none';this.parentNode.textContent=this.dataset.init"/>`:getInitial(u.fullName);
    return `<div class="profile-card" data-id="${u._id}">
      <div class="card-main">
        <div class="profile-photo">${avHTML}</div>
        <div class="card-center">
          <div class="user-name">${safe(u.fullName)}</div>
          <div class="role-row"><span class="role-badge ${rc}">${safe(u.role)}</span></div>
          <div class="card-subtitle">${safe(subtitle)}</div>
          <div class="card-desc">${safe(desc)}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-unskip" type="button" onclick="unskipProfile('${u._id}')">↩ Unskip</button>
      </div>
    </div>`;
  }

  function checkEmpty(){
    const remaining=document.querySelectorAll(".profile-card");
    if(!remaining.length){
      document.getElementById("profilesList").innerHTML="";
      document.getElementById("emptyState").classList.add("visible");
    }
  }

  async function loadSkipped(){
    const listEl=document.getElementById("profilesList");
    const emptyEl=document.getElementById("emptyState");
    try{
      const res=await fetch(`/skipped?userId=${encodeURIComponent(currentUser._id)}`,{cache:"no-store",headers:{"Authorization":`Bearer ${localStorage.getItem("token")||sessionStorage.getItem("token")||""}`}});
      const data=await res.json();
      const users=(data&&data.success&&Array.isArray(data.users))?data.users:[];
      if(!users.length){ listEl.innerHTML=""; emptyEl.classList.add("visible"); return; }
      emptyEl.classList.remove("visible");
      listEl.innerHTML=users.map(cardHTML).join("");
    }catch(e){ listEl.innerHTML=""; emptyEl.classList.add("visible"); }
  }

  window.unskipProfile=async function(targetId){
    const card=document.querySelector(`.profile-card[data-id="${targetId}"]`);
    if(card){ card.style.opacity="0"; card.style.transform="translateX(-60px)"; card.style.transition="all 220ms ease"; }
    try{
      const res=await fetch("/skipped/remove",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${localStorage.getItem("token")||sessionStorage.getItem("token")||""}`},body:JSON.stringify({userId:currentUser._id,targetId})});
      const data=await res.json();
      if(!data || !data.success) _ssAlert(data?.message||"Could not unskip");
    }catch(e){ _ssAlert("Server error while unskipping"); }
    setTimeout(()=>{ if(card) card.remove(); checkEmpty(); },230);
  };

  loadSkipped();

  // Notification & chat badge polling (fix #4)
  // pollNotifications handled by custom-ui.js — removed to prevent duplicate toasts
  let totalUnread=0;
  // updateNotiBadge handled by custom-ui.js
  function updateChatBadge(){
    const txt=totalUnread>99?"99+":String(totalUnread);
    ["navChatBadge","mobNavChatBadge"].forEach(id=>{
      const b=document.getElementById(id); if(!b) return;
      if(totalUnread>0){b.textContent=txt;b.style.display="flex";}
      else{b.style.display="none";b.textContent="";}
    });
  }
  async function loadUnreadCounts(){
    try{
      const tok=localStorage.getItem("token")||sessionStorage.getItem("token")||"";
      const res=await fetch(`/chat/unread-counts?userId=${encodeURIComponent(currentUser._id)}`,{cache:"no-store",headers:{"Authorization":`Bearer ${tok}`}});
      const data=await res.json();
      if(data && data.success&&data.counts){ totalUnread=Object.values(data.counts).reduce((s,c)=>s+c,0); updateChatBadge(); }
    }catch(e){}
  }
  loadUnreadCounts();
  // Pause polling when tab is hidden
  var _unreadTimer = setInterval(loadUnreadCounts, 30000);
  document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
      clearInterval(_unreadTimer);
    } else {
      loadUnreadCounts();
      _unreadTimer = setInterval(loadUnreadCounts, 30000);
    }
  });

  // ✅ Socket — remove card instantly when user deletes account or connection is established
  (function(){
    try{
      function initSkippedSocket(){
        if(typeof window.io==="undefined") { setTimeout(initSkippedSocket, 200); return; }
        // Reuse session-guard socket if available
        const socket = window._ssSocket || window.io({auth:{userId:currentUser._id,token:localStorage.getItem("token")||sessionStorage.getItem("token")||""},transports:["websocket","polling"]});
        if(!window._ssSocket) window._ssSocket = socket;

        // ✅ Remove skipped card instantly when that user deletes their account
        socket.on("account:deleted",({deletedUserId})=>{
          const card=document.querySelector(`.profile-card[data-id="${deletedUserId}"]`);
          if(card){
            card.style.opacity="0";
            card.style.transition="opacity 0.2s";
            setTimeout(()=>{ card.remove(); checkEmpty(); },200);
          }
        });

        // ✅ Remove skipped card instantly when you connect with that user
        socket.on("connection:established",({userId1,userId2})=>{
          const connectedId=String(userId1)===String(currentUser._id)?String(userId2):String(userId1);
          const card=document.querySelector(`.profile-card[data-id="${connectedId}"]`);
          if(card){
            card.style.opacity="0";
            card.style.transform="translateX(60px)";
            card.style.transition="all 220ms ease";
            setTimeout(()=>{ card.remove(); checkEmpty(); },230);
          }
        });

        // ✅ Real-time: reload skipped list on connection events
        socket.on("notification:new", function(payload){
          if(!payload) return;
          var relevant = ["auto_connected","connected","declined"];
          if(relevant.includes(payload.type)) loadSkipped();
        });
      }
      initSkippedSocket();
    }catch(e){ console.warn("Socket init failed:",e); }
  })();
</script>

<script>
// ═══ LOGOUT CLEANUP — remove stale session-guard keys ═══
(function(){
  // Wrap the logout fetch — clear ALL ss_activetab_* keys before redirect
  function cleanupOnLogout() {
    try {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('ss_activetab_') === 0) keys.push(k);
        if (k && k.indexOf('ss_tab_') === 0) keys.push(k);
      }
      keys.forEach(function(k) { localStorage.removeItem(k); });
    } catch(e) {}
  }
  // Listen for manual logout clicks (any element with onclick containing 'logout')
  document.addEventListener('click', function(ev) {
    var el = ev.target;
    while (el && el !== document.body) {
      var attr = el.getAttribute && el.getAttribute('onclick');
      if (attr && (attr.indexOf('/logout') !== -1 || attr.indexOf('Logout') !== -1 || attr.indexOf('logout') !== -1)) {
        cleanupOnLogout();
        break;
      }
      el = el.parentElement;
    }
  }, true);
  // Expose helper globally for any script to call
  window._ssCleanupLogout = cleanupOnLogout;
})();
