<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password - Startup Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" /></noscript>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:            #F7F7F8;
      --card-bg:       #FFFFFF;
      --input-bg:      #F4F4F5;
      --input-border:  #E4E4E7;
      --text-primary:  #111118;
      --text-secondary:#6B7280;
      --text-muted:    #9CA3AF;
      --accent:        #111118;
      --accent-hover:  #2d2d35;
      --border:        #E4E4E7;
      --success:       #16A34A;
      --error:         #DC2626;
      --radius:        12px;
      --font-h:        'Sora', sans-serif;
      --font-b:        'Inter', sans-serif;
      --ease:          cubic-bezier(0.4,0,0.2,1);
      --shadow-card:   0 4px 6px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.08);
    }

    html { background: var(--bg); min-height: 100%; font-family: var(--font-b); }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1.25rem;
      background: var(--bg);
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    @media(min-height:700px) {
      body { align-items: center; padding: 1.25rem; }
    }

    button, input, textarea, select { font-family: inherit; font-size: 16px; }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 40%, rgba(240,240,242,0.55) 100%);
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      box-shadow: var(--shadow-card);
      animation: cardIn 0.55s var(--ease) both;
      overflow: hidden;
      will-change: transform, opacity;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #888 0%, #111118 50%, #888 100%);
      background-size: 200% 100%;
      animation: accentSlide 4s ease-in-out infinite;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    @keyframes accentSlide {
      0%   { background-position: 0% 0; }
      50%  { background-position: 100% 0; }
      100% { background-position: 0% 0; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .header {
      text-align: center; margin-bottom: 1.8rem;
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      width: 3.5rem; height: 3.5rem; border-radius: 50%;
      background: #111118; border: 1.5px solid #333;
      margin: 0 auto 1rem auto; flex-shrink: 0;
      animation: logoGlow 4s ease-in-out infinite;
    }

    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); border-color: #333; }
      50%       { box-shadow: 0 0 0 6px rgba(0,0,0,0.12); border-color: #555; }
    }

    .logo span { font-family: var(--font-h); font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: 0.04em; }

    .header h1 {
      font-family: var(--font-h); font-size: 1.1rem; font-weight: 700;
      color: var(--text-primary); letter-spacing: 0.04em;
      margin-bottom: 0.4rem; line-height: 1.2;
    }

    .header p {
      font-size: 0.72rem; color: var(--text-secondary);
      font-weight: 400; font-family: var(--font-b);
    }

    .header p sup {
      font-size: 0.7em; vertical-align: super;
      font-weight: 600; color: var(--text-muted); margin-left: 1px;
    }

    /* ── Form ── */
    form { display: flex; flex-direction: column; gap: 1rem; position: relative; z-index: 2; }

    .input-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .input-label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-primary); font-family: var(--font-b);
    }

    .input-wrapper { position: relative; display: flex; align-items: center; }

    /* ── Email row ── */
    .email-row { display: flex; gap: 10px; align-items: center; }
    .email-row .input-wrapper { flex: 1; }

    /* ── Input icon ── */
    .input-icon {
      position: absolute; left: 0.85rem;
      color: var(--text-muted); pointer-events: none; z-index: 1;
    }

    /* ── Inputs ── */
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%; padding: 0.75rem 2.8rem 0.75rem 2.8rem;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.9rem; font-family: var(--font-b);
      color: var(--text-primary);
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s;
      outline: none;
      appearance: none; -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      background: #FFFFFF;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(17,17,24,0.1);
      color: var(--text-primary);
    }

    /* ── Toggle password ── */
    .toggle-password {
      position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-family: var(--font-b);
      font-size: 0.68rem; font-weight: 600;
      transition: color 0.2s; padding: 0; width: auto; box-shadow: none;
      appearance: none; -webkit-appearance: none;
    }

    .toggle-password:hover { color: var(--accent); transform: translateY(-50%); box-shadow: none; }

    /* ── Send OTP button ── */
    .send-otp-btn {
      white-space: nowrap;
      background: var(--accent); color: #FFFFFF;
      font-family: var(--font-h); font-weight: 600;
      font-size: 0.75rem; letter-spacing: 0.03em;
      padding: 0.75rem 1rem; border-radius: 8px;
      border: none; cursor: pointer;
      transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease), background 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: auto;
      appearance: none; -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .send-otp-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.32); }
    .send-otp-btn:active { transform: translateY(0); }
    .send-otp-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%; padding: 0.82rem 1rem;
      border: none; border-radius: 8px;
      font-family: var(--font-h); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em;
      transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease), background 0.15s;
      position: relative; overflow: hidden;
      background: var(--accent); color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      margin-top: 0.25rem;
      appearance: none; -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn::after {
      content: ''; position: absolute; top: 0; left: -110%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.45s var(--ease); transform: skewX(-15deg);
    }
    .submit-btn:hover::after { left: 150%; }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.32); }
    .submit-btn:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

    /* ── OTP note ── */
    .otp-success-note {
      font-family: var(--font-b); font-size: 0.75rem; font-weight: 500;
      color: #15803D; margin-top: 5px; display: none;
      background: #F0FDF4; border: 1.5px solid #BBF7D0;
      border-radius: 8px; padding: 8px 12px;
      animation: bannerIn 0.3s var(--ease);
    }

    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.25rem; text-align: center;
      position: relative; z-index: 2;
    }

    .back-link {
      font-family: var(--font-b); font-size: 0.78rem;
      color: var(--accent); text-decoration: none; font-weight: 500;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }

    /* ── Responsive ── */
    @media(max-width:520px){
      .card { padding: 1.75rem 1.35rem; border-radius: 10px; }
      .email-row { flex-direction: column; align-items: stretch; }
      .send-otp-btn { width: 100%; }
    }
    @media(max-width:400px){
      .card { padding: 1.4rem 1.1rem; border-radius: 10px; }
      .logo { width: 3rem; height: 3rem; }
    }
    @media(max-width:360px){ .card { padding: 1.15rem 1rem; } }
    @media(max-width:1024px){ .container, .card{max-width:440px;} }
    @media(min-width:768px){ .card { max-width: 460px; padding: 3rem 2.75rem; } }
    @media(min-width:1200px){ .card { padding: 3.25rem 3rem; } }
    @media(max-height:600px) and (orientation:landscape){
      body { align-items: flex-start; padding: 1rem 1.25rem; }
      .card { padding: 1.5rem 2rem; }
      .header { margin-bottom: 1rem; }
      .logo { width: 2.5rem; height: 2.5rem; margin-bottom: 0.5rem; }
    }
  
    /* ==SS-BW-START== */
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;}
    body{overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body,button,input,select,textarea{font-family:'Sora','Inter',sans-serif!important;}
    input,select,textarea{font-size:max(16px,1em)!important;}
    body{padding-bottom:env(safe-area-inset-bottom,0);padding-left:env(safe-area-inset-left,0);padding-right:env(safe-area-inset-right,0);}

    /* Page Loader - shows on initial load only */
    #ss-loader{position:fixed;inset:0;z-index:2147483647;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .35s ease,visibility .35s ease;}
    #ss-loader.ss-gone{opacity:0;visibility:hidden;pointer-events:none;}
    #ss-loader .sll{width:52px;height:52px;border-radius:50%;background:#111118;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:ssLG 2s ease-in-out infinite;}
    #ss-loader .sll span{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.04em;}
    #ss-loader .sld{display:flex;gap:6px;}
    #ss-loader .sld span{width:6px;height:6px;border-radius:50%;background:#111118;animation:ssLD 1.4s ease-in-out infinite;}
    #ss-loader .sld span:nth-child(2){animation-delay:.2s;}
    #ss-loader .sld span:nth-child(3){animation-delay:.4s;}
    @keyframes ssLG{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,.1),0 2px 12px rgba(0,0,0,.2);}50%{box-shadow:0 0 0 6px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.32);}}
    @keyframes ssLD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Nav - TM transparent, logo glow */
    .top-nav{padding-top:env(safe-area-inset-top,0);}

    /* Black glow on ALL primary buttons */
    .btn-interested,.btn-accept,.btn-chat,.btn-go-connections,.btn-discover,.btn-unskip,
    .btn-connect,.submit-btn,.btn-interested,.send-otp-btn,
    button[type=submit]{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    @keyframes ssBtnG{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.22);}50%{box-shadow:0 5px 24px rgba(0,0,0,.45),0 0 0 3px rgba(0,0,0,.07);}}

    /* Index/login page - keep existing blue accent but add glow */
    #submitBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}
    #confirmOtpBtn{animation:ssBtnG 2.8s ease-in-out infinite!important;}

    /* B&W on index/reset - card top accent white */
    .container::before,.card::before{background:linear-gradient(90deg,#555 0%,#111 50%,#555 100%)!important;background-size:200% 100%!important;}

    /* Discover cards */
    .profile-grid .profile-card{border:1.5px solid #111118!important;box-shadow:3px 3px 0 #111118,0 4px 12px rgba(0,0,0,.07)!important;transition:transform .18s ease,box-shadow .18s ease!important;}
    .profile-grid .profile-card:hover{transform:translateY(-3px)!important;box-shadow:5px 5px 0 #111118,0 8px 24px rgba(0,0,0,.12)!important;}
    @keyframes ssCardIn{from{opacity:0;transform:translateY(18px) rotate(-1deg) scale(.97);}to{opacity:1;transform:translateY(0) rotate(0) scale(1);}}
    .profile-grid .profile-card{animation:ssCardIn .4s cubic-bezier(.34,1.3,.64,1) both;}

    /* Connected cards */
    .connection-card{border:1px solid #e0e0e0!important;box-shadow:0 2px 12px rgba(0,0,0,.06)!important;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s!important;}
    .connection-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#111118;border-radius:12px 12px 0 0;}
    .connection-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 22px rgba(0,0,0,.11)!important;}

    /* Skipped cards */
    .profiles-list .profile-card{border:1px solid #e4e4e7!important;box-shadow:0 1px 6px rgba(0,0,0,.05)!important;opacity:.8;position:relative;overflow:hidden;transition:opacity .2s,transform .2s!important;}
    .profiles-list .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#d1d1d1;border-radius:12px 12px 0 0;}
    .profiles-list .profile-card:hover{opacity:1;transform:translateY(-1px)!important;}

    /* Inbox cards */
    .inbox-card{border:1px solid #e8e8e8!important;box-shadow:0 2px 10px rgba(0,0,0,.06)!important;transition:transform .18s,box-shadow .18s!important;}
    .inbox-card:hover{transform:translateY(-2px)!important;box-shadow:0 6px 18px rgba(0,0,0,.1)!important;}

    /* Role badges */
    .role-badge.founder,.role-founder{background:#111118!important;color:#fff!important;border:1px solid #111118!important;}
    .role-badge.investor,.role-investor{background:#fff!important;color:#111118!important;border:1px solid #111118!important;}
    .connected-tag{background:#f0f0f0!important;border:1px solid #ddd!important;color:#111118!important;}
    .avatar{border:2px solid #111118!important;}
    .avatar-wrap{border:2px solid #111118!important;box-shadow:0 0 0 2px #fff,0 0 0 3.5px #111118!important;}

    /* Hide LinkedIn on cards */
    .linkedin-link{display:none!important;}

    /* Admin B&W */
    .admin-header{background:#111118!important;color:#fff!important;}
    .admin-table th{background:#111118!important;color:#fff!important;}

    /* Founder/Investor dashboard - B&W form cards */
    .card{box-shadow:0 4px 24px rgba(0,0,0,.08)!important;border:1px solid #e4e4e7!important;}
    .save-btn,.btn-save{animation:ssBtnG 2.8s ease-in-out infinite!important;background:#111118!important;color:#fff!important;}

    /* connections empty state */
    #emptyState{position:relative;overflow:hidden;}
    #emptyState canvas#ssEC{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    #emptyState .empty-inner{position:relative;z-index:1;}
    #emptyState.ss-go{opacity:0;transition:opacity .4s ease;pointer-events:none;}
    #emptyState.ss-gi{opacity:1;transition:opacity .4s ease;}
    .ss-pills{display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;margin:1.25rem auto 0;}
    .ss-pill{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:999px;border:1px solid #ebebeb;background:#fafafa;animation:ssPI 3s ease-in-out infinite;}
    .ss-pill:nth-child(2){animation-delay:.55s;}.ss-pill:nth-child(3){animation-delay:1.1s;}
    @keyframes ssPI{0%,100%{opacity:.45;}50%{opacity:1;}}
    .ss-pdot{width:7px;height:7px;border-radius:50%;background:#111118;flex-shrink:0;}
    .ss-pdot.g{background:#ccc;}
    .ss-pt{font-size:.72rem;font-weight:600;color:#333;flex:1;text-align:left;}
    .ss-ps{font-size:.6rem;font-weight:700;color:#bbb;}
    .ss-ps.live{color:#111118;}
    .ss-pr{display:flex;align-items:center;gap:14px;justify-content:center;margin:1rem 0;}
    .ss-pl-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,#ccc,transparent);}
    .ss-pd{display:flex;gap:5px;}
    .ss-pd span{width:5px;height:5px;border-radius:50%;background:#111118;animation:ssPD 1.5s ease-in-out infinite;}
    .ss-pd span:nth-child(2){animation-delay:.2s;}.ss-pd span:nth-child(3){animation-delay:.4s;}
    @keyframes ssPD{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}

    /* Welcome mobile */
    @media(max-width:768px){canvas#welcomeCanvas{display:none!important;}}

    /* Safari */
    @supports(-webkit-touch-callout:none){
      .top-nav{position:-webkit-sticky;position:sticky;}
      .mob-left-rail,.page-content,.ch-body,.users-list{-webkit-overflow-scrolling:touch;}
    }
    /* ==SS-BW-END== */

  
    /* B&W button glow */
    button:not(.eye-btn):not(.toggle-password):not(.btn-sent) {
      background: #111118 !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
      animation: bwBtnGlow 2.8s ease-in-out infinite !important;
    }
    button:not(.eye-btn):not(.toggle-password):not(.btn-sent):hover {
      background: #2d2d35 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.38) !important;
    }
    button:not(.eye-btn):not(.toggle-password):not(.btn-sent):active {
      transform: translateY(0) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
    }
    @keyframes bwBtnGlow {
      0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,0.22); }
      50% { box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 0 3px rgba(0,0,0,0.08); }
    }
    /* Container - static black glowing border */
    .container, .card {
      overflow: hidden !important;
      border: 1.5px solid #111118 !important;
      box-shadow: 0 0 12px rgba(17,17,24,0.45), 0 0 28px rgba(17,17,24,0.22), 0 0 48px rgba(17,17,24,0.1), 0 4px 24px rgba(0,0,0,0.1) !important;
    }
    .container::before, .card::before { display: none !important; }
    .container > *, .card > * { position: relative; z-index: 2; }

  
    /* ── Lightning border glow — breathing dim/high ── */
    @keyframes borderLightning {
      0%   { box-shadow: 0 0 0px 0px rgba(17,17,24,0.0), 0 0 0px rgba(17,17,24,0.0); }
      15%  { box-shadow: 0 0 8px 2px rgba(17,17,24,0.35), 0 0 20px rgba(17,17,24,0.12); }
      25%  { box-shadow: 0 0 2px 0px rgba(17,17,24,0.08), 0 0 4px rgba(17,17,24,0.04); }
      40%  { box-shadow: 0 0 18px 4px rgba(17,17,24,0.55), 0 0 40px rgba(17,17,24,0.18); }
      55%  { box-shadow: 0 0 4px 1px rgba(17,17,24,0.12), 0 0 8px rgba(17,17,24,0.06); }
      70%  { box-shadow: 0 0 12px 3px rgba(17,17,24,0.42), 0 0 28px rgba(17,17,24,0.14); }
      85%  { box-shadow: 0 0 2px 0px rgba(17,17,24,0.06), 0 0 4px rgba(17,17,24,0.03); }
      100% { box-shadow: 0 0 0px 0px rgba(17,17,24,0.0), 0 0 0px rgba(17,17,24,0.0); }
    }

    
    .brand-name-heading {
      overflow: visible;
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 800;
      color: #111118;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
      line-height: 1.1;
    }
  
    .c-with-tm {
      position: relative;
      display: inline-block;
    }

    
    .page-sub-title {
      font-size: 0.95rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.18em !important;
      color: #111118 !important;
      text-transform: uppercase !important;
      margin-bottom: 0.1rem !important;
      font-family: 'Inter', sans-serif !important;
    }

  <script>
    (function () {
      const canvas = document.getElementById('particles');
      if (!canvas) return;
      const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window);
      const isLowEnd = navigator.hardwareConcurrency <= 2 || (navigator.deviceMemory && navigator.deviceMemory <= 2);
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced || (isMobile && isLowEnd)) { canvas.style.display='none'; return; }
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      const NODE_COUNT = isMobile ? 22 : 55;
      const CONNECT_DIST = isMobile ? 100 : 160;
      const SPEED_MULT = isMobile ? 0.6 : 1;
      function makeNodes() {
        const cols = Math.ceil(Math.sqrt(NODE_COUNT * (W / H)));
        const rows = Math.ceil(NODE_COUNT / cols);
        const cellW = W / cols, cellH = H / rows, arr = [];
        for (let i = 0; i < NODE_COUNT; i++) {
          const col = i % cols, row = Math.floor(i / cols);
          const x = cellW * col + cellW * 0.1 + Math.random() * cellW * 0.8;
          const y = cellH * row + cellH * 0.1 + Math.random() * cellH * 0.8;
          const angle = Math.random() * Math.PI * 2, speed = (0.25 + Math.random() * 0.35) * SPEED_MULT;
          arr.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: Math.random()*1.4+0.5, phase: Math.random()*Math.PI*2 });
        }
        return arr;
      }
      let nodes = makeNodes();
      window.addEventListener('resize', () => { nodes = makeNodes(); });
      let lastTime = 0;
      const FRAME_INTERVAL = 1000 / (isMobile ? 30 : 60);
      function draw(timestamp) {
        requestAnimationFrame(draw);
        if (timestamp - lastTime < FRAME_INTERVAL) return;
        lastTime = timestamp;
        ctx.fillStyle = '#F7F7F8'; ctx.fillRect(0, 0, W, H);
        nodes.forEach(n => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; n.phase+=0.018; });
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i+1; j < nodes.length; j++) {
            const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
            if (d < CONNECT_DIST) {
              ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
              ctx.strokeStyle=`rgba(0,0,0,${(1-d/CONNECT_DIST)*0.1})`; ctx.lineWidth=0.7; ctx.stroke();
            }
          }
        }
        nodes.forEach(n => {
          const pulse=0.5+0.5*Math.sin(n.phase), radius=n.r*(0.8+0.5*pulse), alpha=0.5+0.5*pulse;
          if (!isMobile) {
            const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,radius*6);
            glow.addColorStop(0,`rgba(0,0,0,${alpha*0.08})`); glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(n.x,n.y,radius*6,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
          }
          ctx.beginPath(); ctx.arc(n.x,n.y,radius,0,Math.PI*2);
          ctx.fillStyle=`rgba(0,0,0,${alpha*0.15})`; ctx.fill();
        });
      }
      requestAnimationFrame(draw);
    })();

<script>
function showPremiumToast(opts) {
  var c = document.getElementById('ss-premium-toast-container'); if (!c) return;
  var t = document.createElement('div'); t.className = 'ss-premium-toast';
  t.innerHTML = '<div class="ss-pt-icon">'+(opts.icon||'✅')+'</div><div class="ss-pt-body"><div class="ss-pt-title">'+(opts.title||'')+'</div><div class="ss-pt-msg">'+(opts.msg||'')+'</div></div>';
  c.appendChild(t);
  setTimeout(function(){ t.classList.add('ss-pt-out'); setTimeout(function(){ if(t.parentNode) t.remove(); },320); }, opts.dur||4000);
}
</script>

</body>
</html>
