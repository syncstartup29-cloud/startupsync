<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password - StartupSync™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" /></noscript>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{--font-h:'Sora',sans-serif;--font-b:'Inter',sans-serif;--ease:cubic-bezier(0.4,0,0.2,1);}
    html{background:#f5f5f7;min-height:100%;font-family:var(--font-b);-webkit-text-size-adjust:100%;}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1.5rem 1rem;background:#f5f5f7;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-overflow-scrolling:touch;} @media(max-height:700px){body{align-items:flex-start;padding-top:1.5rem;}}
    #particles{position:fixed;inset:0;z-index:0;pointer-events:none;display:none;}
    .vignette{display:none;}
    button,input,textarea,select{font-family:inherit;font-size:16px;}

    /* Card */
    .card{
      position:relative;z-index:10;width:100%;max-width:460px;
      background:#fff;border-radius:16px;
      border:1px solid rgba(255,255,255,0.1);
      padding:2.75rem 2.5rem;
      box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 32px 64px rgba(0,0,0,0.6);
      animation:cardIn 0.45s var(--ease) both;
    }
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);border-radius:16px 16px 0 0;}
    @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}

    /* Header */
    .header{text-align:center;margin-bottom:1.8rem;display:flex;flex-direction:column;align-items:center;}
    .logo-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:1rem;}
    .logo-wrap img{height:48px;width:auto;filter:brightness(0) invert(1);}
    .brand-heading{font-family:var(--font-h);font-size:1.8rem;font-weight:800;color:#111;letter-spacing:0.1em;margin-bottom:0.3rem;}
    .brand-tm{font-size:0.45em;vertical-align:super;font-weight:700;color:#111;}
    .header h1{font-family:var(--font-b);font-size:0.95rem;font-weight:600;color:#111;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:0.2rem;}
    .header p{font-size:0.72rem;color:#777;font-family:var(--font-b);}

    /* Form */
    form{display:flex;flex-direction:column;gap:1.1rem;}
    .input-group{display:flex;flex-direction:column;gap:0.4rem;}
    .input-label{font-size:0.72rem;font-weight:600;color:#555;letter-spacing:0.04em;font-family:var(--font-b);}
    .input-wrapper{position:relative;}
    .input-icon{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;width:16px;height:16px;}
    input{
      width:100%;padding:0.78rem 1rem 0.78rem 2.5rem;
      background:#f0f0f5;border:1px solid #ddd;border-radius:8px;
      font-size:0.9rem;font-family:var(--font-b);color:#111;
      transition:border-color 0.2s,box-shadow 0.2s;outline:none;-webkit-appearance:none;appearance:none;
    }
    input::placeholder{color:#888;}
    input:focus{border-color:rgba(255,255,255,0.3);box-shadow:0 0 0 3px rgba(255,255,255,0.05);}
    .email-row{display:flex;gap:8px;} @media(max-width:400px){.email-row{flex-direction:column;} .otp-btn,.send-otp-btn{min-height:40px;padding:0 1rem;}}
    .email-row .input-wrapper{flex:1;}
    .otp-btn, .send-otp-btn{
      padding:0 1.4rem;border:1.5px solid #111;border-radius:8px;
      background:#111;color:#fff;
      font-family:var(--font-h);font-size:0.72rem;
      font-weight:700;letter-spacing:0.06em;cursor:pointer;white-space:nowrap;
      flex-shrink:0;min-height:44px;
      transition:box-shadow 0.2s,transform 0.15s;
    }
    .otp-btn:hover:not(:disabled), .send-otp-btn:hover:not(:disabled){ background:#111; color:#fff; box-shadow:0 0 0 2px #111, 0 0 0 5px rgba(17,17,17,0.2); transform:translateY(-1px); }
    .otp-btn:active:not(:disabled), .send-otp-btn:active:not(:disabled){transform:translateY(0);}
    .otp-btn:disabled, .send-otp-btn:disabled{opacity:0.35;cursor:not-allowed;}
    .password-wrapper{position:relative;}
    .password-wrapper input{padding-right:3.5rem;}
    .toggle-password{
      position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:0;color:#666;
      width:auto;font-family:var(--font-b);font-size:0.68rem;font-weight:600;
      letter-spacing:0.04em;transition:color 0.2s;
    }
    .toggle-password:hover{color:#ccc;transform:translateY(-50%);}

    /* Submit button */
    .submit-btn{
      width:100%;padding:0.75rem 1rem;border:1.5px solid #111;border-radius:8px;
      font-family:var(--font-h);font-size:0.82rem;font-weight:700;cursor:pointer;
      letter-spacing:0.04em;background:#111;color:#fff;margin-top:0.25rem;
      transition:box-shadow 0.2s,transform 0.15s;
    }
    .submit-btn:hover:not(:disabled){ background:#111; box-shadow:0 0 0 2px #111, 0 0 0 5px rgba(17,17,17,0.2); transform:translateY(-1px); color:#fff; }
    .submit-btn:active:not(:disabled){transform:translateY(0);}
    .submit-btn:disabled{opacity:0.4;cursor:not-allowed;}

    /* OTP Banner */
    .otp-banner{display:none;align-items:center;gap:9px;background:#f0f0f5;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:0.75rem;font-weight:600;color:#111;margin-top:6px;font-family:var(--font-b);}
    .otp-banner.show{display:flex;}
    .otp-banner svg{width:16px;height:16px;flex-shrink:0;}

    /* Success */
    .success-screen{display:none;text-align:center;padding:1rem 0;}
    .success-screen.show{display:block;}
    .success-icon-wrap{width:64px;height:64px;border-radius:50%;background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;}
    .success-icon-wrap svg{width:28px;height:28px;color:#4ade80;}
    .success-screen h2{font-family:var(--font-h);font-size:1.1rem;font-weight:700;color:#111;margin-bottom:0.5rem;}
    .success-screen p{font-size:0.82rem;color:#666;margin-bottom:1.5rem;font-family:var(--font-b);}

    /* Back link */
    .back-link{display:block;text-align:center;margin-top:1.2rem;font-size:0.78rem;color:#555;text-decoration:none;font-family:var(--font-b);transition:color 0.2s;}
    .back-link:hover{color:#888;}

    /* Hint */
    .hint{font-size:0.72rem;color:#777;line-height:1.5;margin-top:4px;font-family:var(--font-b);}
    .hint b{color:#666;}

    /* Error */
    .field-error{font-size:0.72rem;color:#ff6b6b;margin-top:4px;font-family:var(--font-b);}

    /* Mobile */
    @media(max-width:480px){body{padding:1rem 0.85rem;align-items:flex-start;}.card{padding:1.5rem 1.2rem;border-radius:12px;}} @media(max-width:380px){body{padding:0.75rem 0.7rem;}.card{padding:1.2rem 1rem;}}
    @media(max-width:400px){.card{padding:1.4rem 1.1rem;}}
    @media(min-width:768px){.card{max-width:480px;padding:3rem 2.75rem;}}
    input,select,textarea{font-size:max(16px,1em)!important;}
    a,button,[role="button"]{-webkit-tap-highlight-color:transparent!important;touch-action:manipulation!important;}
    #ss-loader{display:none!important;}
  </style>
</head>

<form id="resetForm">
      <!-- Email + Send OTP -->
      <div class="input-group">
        <label for="email" class="input-label">Email</label>
        <div class="email-row">
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input type="email" id="email" placeholder="you@gmail.com" required />
          </div>
          <button type="button" class="send-otp-btn" id="sendOtpBtn">Send OTP</button>
        </div>
        <div class="otp-banner" id="otpNote" style="display:none;align-items:center;gap:8px;background:#f0f0f5;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:0.75rem;font-weight:600;color:#111;margin-top:6px;">✓ OTP sent to your Gmail</div>
      </div>

      <!-- OTP -->
      <div class="input-group">
        <label for="otpCode" class="input-label">OTP Code</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
            <path d="m9 12 2 2 4-4" />
          </svg>
          <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric" pattern="\d{6}" required />
        </div>
      </div>

      <!-- New Password -->
      <div class="input-group">
        <label for="newPassword" class="input-label">New Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="newPassword" placeholder="Min. 8 chars + special character" required />
          <button type="button" class="toggle-password" data-target="newPassword">SHOW</button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <label for="confirmPassword" class="input-label">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
          <button type="button" class="toggle-password" data-target="confirmPassword">SHOW</button>
        </div>
      </div>

      <button type="submit" class="submit-btn">Reset Password</button>
    </form>
    <a href="index.html?auth=login" class="back-link">← Back to login</a>
  </div>
<script>
    (function () {
      const canvas = document.getElementById('particles');
      if (!canvas) return;
      const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window);
      const isLowEnd = navigator.hardwareConcurrency <= 2 || (navigator.deviceMemory && navigator.deviceMemory <= 2);
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced || (isMobile && isLowEnd)) { canvas.style.display='none'; return; }
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      const NODE_COUNT = isMobile ? 22 : 55;
      const CONNECT_DIST = isMobile ? 100 : 160;
      const SPEED_MULT = isMobile ? 0.6 : 1;
      function makeNodes() {
        const cols = Math.ceil(Math.sqrt(NODE_COUNT * (W / H)));
        const rows = Math.ceil(NODE_COUNT / cols);
        const cellW = W / cols, cellH = H / rows, arr = [];
        for (let i = 0; i < NODE_COUNT; i++) {
          const col = i % cols, row = Math.floor(i / cols);
          const x = cellW * col + cellW * 0.1 + Math.random() * cellW * 0.8;
          const y = cellH * row + cellH * 0.1 + Math.random() * cellH * 0.8;
          const angle = Math.random() * Math.PI * 2, speed = (0.25 + Math.random() * 0.35) * SPEED_MULT;
          arr.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: Math.random()*1.4+0.5, phase: Math.random()*Math.PI*2 });
        }
        return arr;
      }
      let nodes = makeNodes();
      window.addEventListener('resize', () => { nodes = makeNodes(); });
      let lastTime = 0;
      const FRAME_INTERVAL = 1000 / (isMobile ? 30 : 60);
      function draw(timestamp) {
        requestAnimationFrame(draw);
        if (timestamp - lastTime < FRAME_INTERVAL) return;
        lastTime = timestamp;
        ctx.fillStyle = '#F7F7F8'; ctx.fillRect(0, 0, W, H);
        nodes.forEach(n => { n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; n.phase+=0.018; });
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i+1; j < nodes.length; j++) {
            const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
            if (d < CONNECT_DIST) {
              ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
              ctx.strokeStyle=`rgba(0,0,0,${(1-d/CONNECT_DIST)*0.1})`; ctx.lineWidth=0.7; ctx.stroke();
            }
          }
        }
        nodes.forEach(n => {
          const pulse=0.5+0.5*Math.sin(n.phase), radius=n.r*(0.8+0.5*pulse), alpha=0.5+0.5*pulse;
          if (!isMobile) {
            const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,radius*6);
            glow.addColorStop(0,`rgba(0,0,0,${alpha*0.08})`); glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(n.x,n.y,radius*6,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
          }
          ctx.beginPath(); ctx.arc(n.x,n.y,radius,0,Math.PI*2);
          ctx.fillStyle=`rgba(0,0,0,${alpha*0.15})`; ctx.fill();
        });
      }
      requestAnimationFrame(draw);
    })();
  </script>

  <!-- ✅ ALL ORIGINAL JS — UNTOUCHED -->
  <script>
    document.querySelectorAll(".toggle-password").forEach(btn => {
      btn.addEventListener("click", function () {
        const input = document.getElementById(this.getAttribute("data-target"));
        if (input.type === "password") { input.type = "text"; this.textContent = "HIDE"; }
        else { input.type = "password"; this.textContent = "SHOW"; }
      });
    });

    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const otpNote = document.getElementById("otpNote");

    sendOtpBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) { _ssAlert("Please enter your email first!"); return; }
      if (!(window.isValidSupportEmail||function(e){return /^[a-zA-Z0-9._%+\-]+@gmail\.com$/.test((e||"").toLowerCase());}).call(null,email)) { _ssAlert("Only Gmail addresses are accepted! Use a real Gmail address."); return; }
      sendOtpBtn.disabled = true; sendOtpBtn.textContent = "Sending...";
      try {
        const res = await fetch("/reset-password/send-otp", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
        const result = await res.json();
        if (!result.success) { _ssAlert(result.message || "Failed to send OTP!"); sendOtpBtn.disabled = false; sendOtpBtn.textContent = "Send OTP"; return; }
        otpNote.style.display = "block";
        let countdown = 30;
        const timer = setInterval(() => { countdown--; sendOtpBtn.textContent = `Resend (${countdown}s)`; if (countdown <= 0) { clearInterval(timer); sendOtpBtn.disabled = false; sendOtpBtn.textContent = "Resend OTP"; } }, 1000);
      } catch (err) { console.error(err); _ssAlert("Server error while sending OTP!"); sendOtpBtn.disabled = false; sendOtpBtn.textContent = "Send OTP"; }
    });

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!(window.isValidSupportEmail||function(e){return /^[a-zA-Z0-9._%+\-]+@gmail\.com$/.test((e||"").toLowerCase());}).call(null,email)) { _ssAlert("Only Gmail addresses are accepted! Use a real Gmail address."); return; }
      const otp = document.getElementById("otpCode").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      if (!/^\d{6}$/.test(otp)) { _ssAlert("OTP must be exactly 6 digits!"); return; }
      if (newPassword.length < 8) { _ssAlert("Password must be at least 8 characters."); return; }
      if (!/[A-Z]/.test(newPassword)) { _ssAlert("Password must contain at least one uppercase letter."); return; }
      if (!/[!@#$%^&*(),.?":{}|<>]/.test(newPassword)) { _ssAlert("Password must contain at least one special character."); return; }
      if (newPassword !== confirmPassword) { _ssAlert("Passwords do not match!"); return; }
      try {
        const res = await fetch("/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, otp, newPassword }) });
        const result = await res.json();
        if (!result.success) { _ssAlert(result.message || "Something went wrong!"); return; }
        // ✅ FIX 9: Show premium B&W success toast then redirect
        showPremiumToast({ icon: '✅', title: 'Password Changed', msg: 'Password changed successfully', dur: 4000 });
        setTimeout(function() { window.location.href = 'index.html'; }, 2000);
      } catch (err) { console.error(err); _ssAlert("Server error while resetting password!"); }
    });
  </script>
  
  <script>
  window.isValidSupportEmail = window.isValidSupportEmail || function(email) {
    var e = (email||"").toLowerCase().trim();
    return /^[a-zA-Z0-9._%+\-]+@gmail\.com$/.test(e) && e.split("@")[0].length >= 2;
  };
</script>

<script>
  // ── Inline toast (replaces native alert) ──
  function _ssAlert(msg){
    var t=document.createElement('div');
    t.textContent=msg;
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 20px;border-radius:10px;font-family:Sora,sans-serif;font-size:0.8rem;font-weight:600;z-index:2147483647;box-shadow:0 4px 20px rgba(0,0,0,0.25);max-width:90vw;text-align:center;';
    document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3000);
  }
</script>              


<div id="ss-premium-toast-container"></div>
<script>
function showPremiumToast(opts) {
  var c = document.getElementById('ss-premium-toast-container'); if (!c) return;
  var t = document.createElement('div'); t.className = 'ss-premium-toast';
  t.innerHTML = '<div class="ss-pt-icon">'+(opts.icon||'✅')+'</div><div class="ss-pt-body"><div class="ss-pt-title">'+(opts.title||'')+'</div><div class="ss-pt-msg">'+(opts.msg||'')+'</div></div>';
  c.appendChild(t);
  setTimeout(function(){ t.classList.add('ss-pt-out'); setTimeout(function(){ if(t.parentNode) t.remove(); },320); }, opts.dur||4000);
}
</script>
